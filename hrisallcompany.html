// ================= IMPORT WORK SCHEDULES (Sprout Employee List Report) =================
// Sprout stores the schedule as a per-weekday text block:
//   Sunday: rest day
//   Monday: 08:00 AM - 05:00 PM   ...
// We parse that verbatim into hris_shifts.days = {"0":null,"1":{start,end},...} (0=Sunday).
const SDOW={sunday:0,monday:1,tuesday:2,wednesday:3,thursday:4,friday:5,saturday:6};
const SDOWN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function to24(s){
  const m=String(s||'').trim().match(/^(\d{1,2}):(\d{2})\s*([AaPp][Mm])?$/);
  if(!m) return null;
  let h=parseInt(m[1],10); const ap=(m[3]||'').toUpperCase();
  if(ap==='PM'&&h<12)h+=12; if(ap==='AM'&&h===12)h=0;
  return String(h).padStart(2,'0')+':'+m[2];
}
function parseSchedule(txt){
  const days={}; let any=false;
  String(txt||'').split(/\r?\n/).forEach(line=>{
    const m=line.match(/^\s*([A-Za-z]+)\s*:\s*(.+?)\s*$/); if(!m) return;
    const d=SDOW[m[1].toLowerCase()]; if(d===undefined) return;
    const v=m[2].trim();
    if(/rest\s*day/i.test(v)){ days[d]=null; any=true; return; }
    const r=v.match(/(\d{1,2}:\d{2}\s*[AaPp][Mm])\s*[-–]\s*(\d{1,2}:\d{2}\s*[AaPp][Mm])/);
    if(!r){ days[d]=null; any=true; return; }
    const st=to24(r[1]), en=to24(r[2]);
    // "12:00 AM - 12:00 AM" is Sprout's way of saying no work that day
    if(!st||!en||st===en){ days[d]=null; any=true; return; }
    days[d]={start:st,end:en}; any=true;
  });
  if(!any) return null;
  for(let d=0;d<7;d++) if(!(d in days)) days[d]=null;
  return days;
}
function scheduleName(days){
  const work=[]; for(let d=0;d<7;d++) if(days[d]) work.push(d);
  if(!work.length) return 'No working days';
  const times=[...new Set(work.map(d=>days[d].start+'-'+days[d].end))];
  const t = times.length===1 ? times[0] : 'varies';
  // contiguous run of workdays reads as Mon–Sat; otherwise list them
  const contiguous = work.every((d,i)=> i===0 || d===work[i-1]+1);
  const dayLbl = work.length===7 ? 'Daily'
    : (contiguous && work.length>2) ? `${SDOWN[work[0]]}–${SDOWN[work[work.length-1]]}`
    : work.map(d=>SDOWN[d]).join(',');
  return `${t} · ${dayLbl}`;
}
VIEWS.schedimport = async ()=>{
  $('#view').innerHTML=`<div style="margin-bottom:10px"><button class="btn ghost sm" onclick="go('imports')">← Back to Import Center</button></div>
    <div class="panel pad">
    <h3 style="margin-top:0">Import Work Schedules — ${esc(ME.companyName||'this company')}</h3>
    <p class="muted">Upload Sprout's <b>Employee List Report</b>. It reads the <b>Schedule</b> column —
      the per-weekday block like <i>“Monday: 08:00 AM - 05:00 PM … Sunday: rest day”</i> — creates a shift
      template for each distinct pattern, and assigns every employee to theirs.</p>
    <p class="muted" style="font-size:12px">Also captures <b>Schedule Type</b> and <b>No. of Hours to Work</b>.
      Employees are matched by <b>Employee ID</b> within this company. Safe to re-run.</p>
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;margin:10px 0">
      <input type="checkbox" id="si_rebuild" checked style="width:auto">
      Recompute existing timekeeping afterwards (fills in Late / Undertime / OT for attendance already imported)</label>
    <div style="margin-top:8px"><input type="file" id="siFile" accept=".xlsx,.xls"></div>
    <div style="margin-top:12px"><button class="btn" onclick="schedImport()">Import Schedules</button></div>
    <div id="siResult" style="margin-top:16px"></div>
  </div>`;
};
async function schedImport(){
  const inp=document.getElementById('siFile'); const f=inp&&inp.files[0];
  if(!f){toast('Choose the Employee List Report');return;}
  if(typeof XLSX==='undefined'){toast('Excel reader not loaded');return;}
  const box=document.getElementById('siResult'); box.innerHTML='<div class="spin">Reading workbook…</div>';
  const wb=XLSX.read(await f.arrayBuffer(),{type:'array',cellDates:false,raw:false});
  const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
  if(!rows.length){box.innerHTML='<div class="panel pad">⚠️ No rows found.</div>';return;}
  const g=(r,...keys)=>{ const o={}; Object.keys(r).forEach(k=>o[norm(k)]=r[k]);
    for(const k of keys){ const v=o[norm(k)]; if(v!==undefined&&v!=='') return v; } return ''; };

  const {data:emps}=await sb.from('hris_employees').select('id,employee_no,biometric_id').eq('company_id',ME.company);
  const byId={}; (emps||[]).forEach(e=>{ if(e.employee_no)byId[norm(e.employee_no)]=e.id; if(e.biometric_id)byId[norm(e.biometric_id)]=e.id; });

  // 1. collect the distinct schedule patterns
  const pats=new Map(); const assign=[]; const miss=new Set(); let noSched=0;
  for(const r of rows){
    const empRaw=g(r,'Employee ID','EmployeeID','Employee No'); if(!empRaw) continue;
    const eid=byId[norm(empRaw)];
    if(!eid){ miss.add(String(empRaw)); continue; }
    const days=parseSchedule(g(r,'Schedule','Work Schedule','Shift'));
    if(!days){ noSched++; continue; }
    const sig=JSON.stringify(days);
    if(!pats.has(sig)) pats.set(sig,{days,name:scheduleName(days),count:0});
    pats.get(sig).count++;
    // Sprout packs the bank details into one cell: "Bank: BDO\nAccount number: 1234..."
    const bankRaw=String(g(r,'Bank Accounts','Bank Account','Bank')||'');
    const bm=bankRaw.match(/bank\s*:\s*([^\n\r]*)/i);
    const am=bankRaw.match(/account\s*number\s*:\s*([^\n\r]*)/i) || bankRaw.match(/account\s*:\s*([^\n\r]*)/i);
    assign.push({eid, sig,
      schedule_type:String(g(r,'Schedule Type')||'')||null,
      hours_to_work:Number(g(r,'No. of Hours to Work','Hours to Work'))||null,
      bank_name:(bm&&bm[1].trim())||null,
      bank_account:(am&&am[1].trim().replace(/\s+/g,''))||null,
      supervisor:String(g(r,'Immediate Supervisor','Supervisor','Reports To')||'').trim()});
  }
  if(!assign.length){
    box.innerHTML=`<div class="panel pad">⚠️ No schedules could be read. ${miss.size?`${miss.size} Employee ID(s) didn't match this company — are you on the right company?`:'Check that the export includes the <b>Schedule</b> column.'}</div>`;
    return;
  }

  box.innerHTML=`<div class="spin">Creating ${pats.size} shift template(s)…</div>`;
  // 2. create (or reuse) a shift per pattern
  const {data:existing}=await sb.from('hris_shifts').select('id,name,days').eq('company_id',ME.company);
  const bySig={}; (existing||[]).forEach(s=>{ if(s.days) bySig[JSON.stringify(s.days)]=s.id; });
  const errs=[]; let made=0;
  for(const [sig,p] of pats){
    if(bySig[sig]) continue;
    const work=[]; for(let d=0;d<7;d++) if(p.days[d]) work.push(d);
    const first=work.length?p.days[work[0]]:{start:'08:00',end:'17:00'};
    const {data,error}=await sb.from('hris_shifts').insert({
      company_id:ME.company, name:p.name, days:p.days, work_days:work,
      start_time:first.start, end_time:first.end,
      break_minutes:60, grace_minutes:15,
      is_night_shift: first.end < first.start
    }).select('id').single();
    if(error||!data){ errs.push('Shift "'+p.name+'": '+(error?error.message:'failed')); continue; }
    bySig[sig]=data.id; made++;
  }

  // 3. assign employees
  box.innerHTML=`<div class="spin">Assigning ${assign.length} employee(s)…</div>`;
  let ok=0, banks=0;
  for(const a of assign){
    const sid=bySig[a.sig]; if(!sid) continue;
    const rec={shift_id:sid, schedule_type:a.schedule_type, hours_to_work:a.hours_to_work};
    if(a.bank_account){
      rec.bank_account=a.bank_account;
      rec.bank_name=a.bank_name||null;
      rec.payment_method='bank';
      banks++;
    }
    const {error}=await sb.from('hris_employees').update(rec).eq('id',a.eid);
    if(error){ if(errs.length<5) errs.push(error.message); } else ok++;
  }
  window._siBanks=banks;

  // 3b. link each employee to their Immediate Supervisor (matched by name, same company)
  let supLinked=0; const supMissed=new Set();
  {
    const byName={}, byNo={};
    (emps||[]).forEach(x=>{ if(x.employee_no) byNo[norm(x.employee_no)]=x.id; });
    const {data:full}=await sb.from('hris_employees')
      .select('id,employee_no,first_name,middle_name,last_name').eq('company_id',ME.company);
    (full||[]).forEach(x=>{
      const f=(x.first_name||'').trim(), l=(x.last_name||'').trim(), m=(x.middle_name||'').trim();
      [`${f} ${l}`,`${l} ${f}`,`${l}, ${f}`,`${f} ${m} ${l}`].forEach(k=>{
        const nk=norm(k); if(nk && !byName[nk]) byName[nk]=x.id;
      });
    });
    for(const a of assign){
      const s=a.supervisor;
      if(!s || /^(n\/a|na|none|not yet set)$/i.test(s)) continue;
      const mgr=byName[norm(s)] || byNo[norm(s)];
      if(!mgr){ supMissed.add(s); continue; }
      if(mgr===a.eid) continue;
      const {error}=await sb.from('hris_employees').update({manager_id:mgr}).eq('id',a.eid);
      if(!error) supLinked++;
    }
  }

  // 4. re-derive Late / Undertime / OT for attendance already loaded
  let rebuilt=null;
  if(document.getElementById('si_rebuild')?.checked){
    box.innerHTML='<div class="spin">Recomputing timekeeping against the new schedules…</div>';
    const {data,error}=await sb.rpc('hris_rebuild_dtr_company',{p_from:null,p_to:null});
    if(error) errs.push('Rebuild: '+error.message); else rebuilt=data;
  }

  const list=[...pats.values()].sort((a,b)=>b.count-a.count);
  box.innerHTML=`<div class="panel pad">
    <b style="color:var(--green-d)">Assigned ${ok} employee(s) to ${pats.size} schedule(s)</b>
    ${made?` · ${made} new shift template(s) created`:''}
    ${window._siBanks?` · ${window._siBanks} bank account(s) captured`:''}
    ${supLinked?` · ${supLinked} supervisor link(s) set`:''}
    ${rebuilt!=null?` · ${rebuilt} day-record(s) recomputed`:''}
    ${supMissed.size?`<div class="muted" style="font-size:12px;margin-top:6px;color:#b45309">${supMissed.size} supervisor name(s) didn't match anyone in this company (e.g. ${[...supMissed].slice(0,5).map(esc).join(', ')}).</div>`:''}
    <div style="margin-top:10px">${list.map(p=>`<div class="kv"><span>${esc(p.name)}</span><b>${p.count}</b></div>`).join('')}</div>
    ${noSched?`<div class="muted" style="font-size:12px;margin-top:8px">${noSched} row(s) had no schedule set in Sprout — left unassigned.</div>`:''}
    ${miss.size?`<div class="muted" style="font-size:12px;margin-top:8px;color:#c0392b">${miss.size} Employee ID(s) not in this company (e.g. ${[...miss].slice(0,6).map(esc).join(', ')}).</div>`:''}
    ${errs.length?`<div class="muted" style="font-size:12px;margin-top:8px">${errs.slice(0,5).map(esc).join('<br>')}</div>`:''}
    <div class="muted" style="font-size:12px;margin-top:8px">Rest days are honoured: work on a rest day or holiday counts as overtime, with no tardiness or undertime.</div>
  </div>`;
  toast(`Schedules assigned to ${ok} employee(s)`);
}

// Cutoff dates follow the frequency + month, and the period name follows the cutoff.
function paygenDates(){
  const f=val('pg_freq');
  const mv=val('pg_month')||todayStr().slice(0,7);
  const y=Number(mv.slice(0,4)), m=Number(mv.slice(5,7));
  const last=new Date(y,m,0).getDate();
  const pad=n=>String(n).padStart(2,'0');
  const s=document.getElementById('pg_start'), e=document.getElementById('pg_end');
  const cutWrap=document.getElementById('pg_cut_wrap');

  if(f==='monthly'){
    if(cutWrap) cutWrap.style.display='none';
    if(s) s.value=`${y}-${pad(m)}-01`;
    if(e) e.value=`${y}-${pad(m)}-${pad(last)}`;
  } else {
    if(cutWrap) cutWrap.style.display='';
    const cut=val('pg_cut')||'1';
    if(cut==='1'){ if(s)s.value=`${y}-${pad(m)}-01`; if(e)e.value=`${y}-${pad(m)}-15`; }
    else         { if(s)s.value=`${y}-${pad(m)}-16`; if(e)e.value=`${y}-${pad(m)}-${pad(last)}`; }
  }
  paygenPayDate();
  paygenName();
}
// Sensible default pay date: 5 days after the cutoff ends.
function paygenPayDate(){
  const p=document.getElementById('pg_pay'); if(!p || p.dataset.touched) return;
  const end=val('pg_end'); if(!end) return;
  const d=new Date(end+'T00:00:00'); d.setDate(d.getDate()+5);
  p.value=d.toISOString().slice(0,10);
}
// "NBC 2026-07 1st Cutoff" — company code + ISO year-month so it sorts chronologically
// in every export, plain ASCII so bank files and Excel never mangle it.
function paygenPeriodName(freq,start,end){
  if(!start||!end) return '';
  const co  = ME.companyCode ? ME.companyCode+' ' : '';
  const sy  = Number(start.slice(0,4)), sm = Number(start.slice(5,7)), sd = Number(start.slice(8,10));
  const em  = Number(end.slice(5,7)),   ed = Number(end.slice(8,10));
  const ym  = `${sy}-${String(sm).padStart(2,'0')}`;
  const lastDay = new Date(sy, sm, 0).getDate();

  if(sm===em && start.slice(0,4)===end.slice(0,4)){
    if(freq==='monthly' || (sd===1 && ed===lastDay)) return `${co}${ym} Monthly`;
    if(sd===1  && ed===15)      return `${co}${ym} 1st Cutoff`;
    if(sd===16 && ed===lastDay) return `${co}${ym} 2nd Cutoff`;
    return `${co}${ym} ${String(sd).padStart(2,'0')}-${String(ed).padStart(2,'0')}`;  // custom range
  }
  return `${co}${ym}-${String(sd).padStart(2,'0')} to ${end}`;   // spans months
}
function paygenName(){
  const n=document.getElementById('pg_name'); if(!n) return;
  if(n.dataset.touched) return;               // HR typed their own name — leave it alone
  n.value=paygenPeriodName(val('pg_freq'), val('pg_start'), val('pg_end'));
}

  $('#vaction').innerHTML=`<button class="btn" onclick="coForm()">+ New Company</button>`;
  const [{data:cos},{data:mems}]=await Promise.all([
    sb.from('hris_companies').select('*').order('name'),
    sb.from('hris_company_members').select('company_id')
  ]);
  window._cos=cos||[];
  const cnt={}; (mems||[]).forEach(m=>cnt[m.company_id]=(cnt[m.company_id]||0)+1);
  $('#view').innerHTML=`<div class="panel pad" style="background:var(--green-l);border-color:#bfe3ce">
      Each company's data is isolated. Members only see the company they're switched into; users can belong to several companies. Statutory tables and leave types are shared across the group.
    </div>
    <div class="panel"><div class="ph"><h3>Group Companies</h3></div>
    <div class="pb"><table><thead><tr><th>Company</th><th>Legal Name</th><th>TIN</th><th>Members</th><th>Status</th><th></th></tr></thead>
    <tbody>${(cos||[]).map((c,i)=>{
      const on = c.is_active!==false;
      return `<tr${on?'':' style="opacity:.55;background:#fafafa"'}>
        <td><b>${esc(c.name)}</b>${c.id===ME.company?' <span class="tag blue">current</span>':''}</td>
        <td>${esc(c.legal_name||'—')}</td><td>${esc(c.tin||'—')}</td>
        <td>${cnt[c.id]||0}</td>
        <td>${on?'<span class="tag green">Enabled</span>':'<span class="tag gray">Disabled</span>'}</td>
        <td class="right" style="white-space:nowrap">
          <button class="btn ghost sm" onclick="coForm(${i})">Edit</button>
          <button class="btn ghost sm" onclick="coMembers(${i})">Members</button>
          <button class="btn ${on?'amber':''} sm" onclick="coToggle('${c.id}',${!on},'${esc(c.name)}')">${on?'Disable':'Enable'}</button>
        </td></tr>`;
    }).join('')||'<tr><td colspan=6 class="empty">No companies</td></tr>'}</tbody></table></div>
    <div class="pad muted" style="font-size:12px">Disabling a company hides it from the company switcher and blocks its employees from signing in.
      <b>No data is deleted</b> — attendance, payroll and 201 records stay intact, and re-enabling brings everything back.</div></div>`;
};
async function coToggle(id,turnOn,name){
  if(!turnOn && !confirm(`Disable ${name}?\n\n• It disappears from the company switcher\n• Its employees can no longer sign in\n• Nothing is deleted — you can re-enable it any time`)) return;
  const {data,error}=await sb.rpc('hris_set_company_active',{p_company:id,p_active:turnOn});
  if(error){toast('Error: '+error.message);return;}
  toast(data||'Updated');
  await boot();          // refresh the switcher
  go('companies');
}
function coForm(i){ const c=(i==null?{}:(window._cos||[])[i])||{};
  openModal(`<div class="mh"><h3>${c.id?'Edit':'New'} Company</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="mb">
      <p class="muted" style="margin-top:0">These details are the <b>letterhead printed on this company's payslips</b>.</p>
      <div class="grid2">
        <div class="fld"><label>Name*</label><input id="co_name" value="${esc(c.name||'')}" oninput="coPrev()"></div>
        <div class="fld"><label>Legal Name (shown on the payslip)</label><input id="co_legal" value="${esc(c.legal_name||'')}" oninput="coPrev()"></div>
        <div class="fld"><label>TIN</label><input id="co_tin" value="${esc(c.tin||'')}" oninput="coPrev()"></div>
        <div class="fld"><label>Phone</label><input id="co_phone" value="${esc(c.phone||'')}" oninput="coPrev()"></div>
        <div class="fld" style="grid-column:1/3"><label>Address</label><input id="co_addr" value="${esc(c.address||'')}" oninput="coPrev()"></div>
      </div>
      <div class="panel pad" style="margin-top:12px;background:#f8fafc">
        <div class="muted" style="font-size:11px;margin-bottom:6px">Payslip header preview</div>
        <div id="co_prev" style="font-weight:800;font-size:15px"></div>
        <div id="co_prev2" class="muted" style="font-size:12px"></div>
      </div>
    </div>
    <div class="mf">${c.id?`<button class="btn danger" onclick="coDel('${c.id}')">Delete</button>`:''}<button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn" onclick="coSave('${c.id||''}')">Save</button></div>`);
  coPrev();
}
function coPrev(){
  const a=document.getElementById('co_prev'), b=document.getElementById('co_prev2');
  if(!a) return;
  a.textContent = val('co_legal') || val('co_name') || 'Company name';
  const bits=[val('co_addr'), val('co_tin')?('TIN '+val('co_tin')):null, val('co_phone')].filter(Boolean);
  b.textContent = bits.join(' · ') || 'Address · TIN · Phone';
}
async function coDel(id){
  if(id===ME.company){toast('You cannot delete the company you are currently signed into. Switch first.');return;}
  if(!confirm('Delete this company? This only works if it has no employees or records. Members lose access to it.'))return;
  const {error}=await sb.from('hris_companies').delete().eq('id',id);
  if(error){toast('Cannot delete: '+(error.message.match(/violates foreign key/i)?'the company still has employees or records.':error.message));return;}
  closeModal();toast('Company deleted');go('companies');
}
async function coSave(id){ const rec={name:val('co_name'),legal_name:val('co_legal')||null,tin:val('co_tin')||null,address:val('co_addr')||null,phone:val('co_phone')||null};
  if(!rec.name){toast('Name required');return;}
  if(id){ const {error}=await sb.from('hris_companies').update(rec).eq('id',id); if(error){toast('Error: '+error.message);return;} }
  else {
    const {data,error}=await sb.from('hris_companies').insert(rec).select('id').maybeSingle();
    if(error){toast('Error: '+error.message);return;}
    if(data&&data.id){ await sb.from('hris_company_members').insert({user_id:ME.user.id,company_id:data.id,role:'admin'}); }
    toast('Company created — reload/sign in again to switch into it');
  }
  closeModal(); if(id)toast('Saved'); go('companies'); }
async function coMembers(i){
  const c=(window._cos||[])[i]; window._coCtx={id:c.id,name:c.name};
  const [{data:mems},{data:users}]=await Promise.all([
    sb.from('hris_company_members').select('*').eq('company_id',c.id).order('created_at'),
    sb.rpc('hris_list_users')
  ]);
  const umap={}; (users||[]).forEach(u=>umap[u.user_id]=u.email);
  window._coUsers=users||[];
  openModal(`<div class="mh"><h3>Members — ${esc(c.name)}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="mb">
      <table><thead><tr><th>User</th><th>Role</th><th></th></tr></thead>
      <tbody>${(mems||[]).map(m=>`<tr><td>${esc(umap[m.user_id]||m.user_id)}</td><td>${roleBadge(m.role)}</td>
        <td class="right"><button class="btn ghost sm" onclick="coDelMember('${m.id}',${i})">Remove</button></td></tr>`).join('')||'<tr><td colspan=3 class="empty">No members</td></tr>'}</tbody></table>
      <div class="row" style="align-items:flex-end;margin-top:12px">
        <div class="fld"><label>Add user</label><select id="cm_user">${(users||[]).map(u=>`<option value="${u.user_id}">${esc(u.email)}</option>`).join('')}</select></div>
        <div class="fld" style="max-width:170px"><label>Role</label><select id="cm_role">${['admin','hr','approver','manager','employee'].map(r=>`<option>${r}</option>`).join('')}</select></div>
        <div style="flex:0"><button class="btn" onclick="coAddMember(${i})">Add</button></div>
      </div>
    </div><div class="mf"><button class="btn ghost" onclick="closeModal()">Close</button></div>`,true);
}
async function coAddMember(i){ const c=(window._cos||[])[i];
  const {error}=await sb.from('hris_company_members').insert({user_id:val('cm_user'),company_id:c.id,role:val('cm_role')});
  if(error){toast('Error: '+error.message);return;} toast('Member added');coMembers(i); }
async function coDelMember(id,i){ const {error}=await sb.from('hris_company_members').delete().eq('id',id);
  if(error){toast(error.message);return;} toast('Removed');coMembers(i); }

// ============ START ============
boot();
</script>
</body>
</html>
