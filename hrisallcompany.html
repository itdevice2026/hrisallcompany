// ================= PAYMENT REGISTER — Bank or Cash disbursement =================
// Payroll goes out by bank transfer by default. If the bank payment doesn't work
// (no account on file, transfer bounced), the payslip is switched to CASH.
const PAY_STATUS={unpaid:'gray',for_release:'amber',paid:'green',failed:'red'};
VIEWS.payreg = async ()=>{
  if(!canFinalPay()){$('#view').innerHTML='<div class="panel pad">The Payment Register is restricted to HR and Administrators.</div>';return;}
  const {data:periods}=await sb.from('hris_payroll_periods')
    .select('id,name,pay_date,status').order('period_end',{ascending:false}).limit(24);
  const list=(periods||[]).filter(p=>['approved','paid','closed'].includes(p.status));
  window._prPeriods=list;
  $('#view').innerHTML=`<div class="panel pad">
      <h3 style="margin-top:0">Payment Register — ${esc(ME.companyName||'this company')}</h3>
      <p class="muted" style="margin-top:0">Salaries are released by <b>bank transfer</b> by default.
        If a bank payment isn't working — no account on file, or the transfer bounced —
        switch that employee to <b>Cash</b> and release it over the counter.</p>
      <div class="row" style="align-items:flex-end;gap:10px;flex-wrap:wrap">
        <div class="fld" style="max-width:320px"><label>Approved Payroll Period</label>
          <select id="pr_period" onchange="prLoad()">
            ${list.length? list.map(p=>`<option value="${p.id}">${esc(p.name)} · pay ${p.pay_date?fdate(p.pay_date):'—'}</option>`).join('')
              : '<option value="">No approved payroll period</option>'}
          </select></div>
        <div class="fld" style="max-width:170px"><label>Show</label>
          <select id="pr_filter" onchange="prRender()">
            <option value="">All</option>
            <option value="bank">Bank only</option>
            <option value="cash">Cash only</option>
            <option value="unpaid">Not yet paid</option>
            <option value="failed">Failed transfers</option>
          </select></div>
        <div style="flex:0;margin-bottom:6px"><button class="btn ghost" onclick="prBankFile()">⬇ Bank Transfer File</button></div>
        <div style="flex:0;margin-bottom:6px"><button class="btn ghost" onclick="prCashList()">⬇ Cash Payout Sheet</button></div>
      </div>
    </div>
    <div id="pr_out">${list.length?'<div class="spin">Loading…</div>':'<div class="panel empty">Approve a payroll period first — payments can only be recorded against an approved payroll.</div>'}</div>`;
  if(list.length) prLoad();
};
async function prLoad(){
  const pid=val('pr_period'); if(!pid) return;
  const box=document.getElementById('pr_out'); box.innerHTML='<div class="spin">Loading…</div>';
  const {data,error}=await sb.from('hris_payslips')
    .select('id,net_pay,payment_method,payment_status,bank_name,bank_account,payment_ref,failure_reason,paid_at,hris_employees(first_name,last_name,employee_no)')
    .eq('period_id',pid).order('id');
  if(error){box.innerHTML=`<div class="panel pad">⚠️ ${esc(error.message)}</div>`;return;}
  window._pr=data||[]; prRender();
}
function prRows(){
  const f=val('pr_filter'); let rows=window._pr||[];
  if(f==='bank')   rows=rows.filter(r=>r.payment_method==='bank');
  if(f==='cash')   rows=rows.filter(r=>r.payment_method==='cash');
  if(f==='unpaid') rows=rows.filter(r=>r.payment_status!=='paid');
  if(f==='failed') rows=rows.filter(r=>r.payment_status==='failed');
  return rows;
}
function prRender(){
  const all=window._pr||[], rows=prRows();
  const box=document.getElementById('pr_out');
  const sum=(a,k)=>a.reduce((s,r)=>s+Number(r[k]||0),0);
  const bank=all.filter(r=>r.payment_method==='bank'), cash=all.filter(r=>r.payment_method==='cash');
  const paid=all.filter(r=>r.payment_status==='paid'), failed=all.filter(r=>r.payment_status==='failed');
  box.innerHTML=`
    <div class="panel"><div class="ph"><h3>Summary</h3></div><div class="pad">
      <div class="row" style="gap:26px;flex-wrap:wrap">
        <div><div class="muted" style="font-size:12px">🏦 Bank transfer</div>
          <div style="font-size:20px;font-weight:800">${bank.length}</div>
          <div class="muted" style="font-size:12px">${peso(sum(bank,'net_pay'))}</div></div>
        <div><div class="muted" style="font-size:12px">💵 Cash</div>
          <div style="font-size:20px;font-weight:800;color:var(--amber,#b45309)">${cash.length}</div>
          <div class="muted" style="font-size:12px">${peso(sum(cash,'net_pay'))}</div></div>
        <div><div class="muted" style="font-size:12px">Paid</div>
          <div style="font-size:20px;font-weight:800;color:var(--green-d,#15803d)">${paid.length}</div></div>
        <div><div class="muted" style="font-size:12px">Failed transfers</div>
          <div style="font-size:20px;font-weight:800;color:${failed.length?'#c0392b':'inherit'}">${failed.length}</div></div>
        <div><div class="muted" style="font-size:12px">Total payout</div>
          <div style="font-size:20px;font-weight:800">${peso(sum(all,'net_pay'))}</div></div>
      </div>
      ${failed.length?`<div class="pad" style="background:#fdf3e3;border:1px solid #f0d9ac;border-radius:8px;margin-top:10px">
        ⚠️ <b>${failed.length}</b> bank transfer(s) failed.
        <button class="btn sm" style="margin-left:8px" onclick="prBulk('switch_to_cash','failed')">Switch all failed to Cash</button></div>`:''}
      ${cash.filter(r=>!r.bank_account).length?`<div class="muted" style="font-size:12px;margin-top:8px">
        ${cash.filter(r=>!r.bank_account).length} employee(s) have <b>no bank account on file</b>, so they default to cash.</div>`:''}
    </div></div>

    <div class="panel"><div class="ph"><h3>Payments (${rows.length})</h3>
      <div class="toolbar">
        <button class="btn ghost sm" onclick="prBulk('mark_paid','shown')">Mark shown as Paid</button>
      </div></div>
    <div class="pb" style="max-height:600px;overflow:auto"><table><thead><tr>
      <th>Employee</th><th>Method</th><th>Bank / Account</th><th class="right">Net Pay</th>
      <th>Status</th><th class="right">Action</th></tr></thead>
    <tbody>${rows.map(r=>{
      const e=r.hris_employees||{};
      const isCash=r.payment_method==='cash';
      return `<tr${r.payment_status==='failed'?' style="background:#fff5f5"':''}>
        <td><b>${esc((e.first_name||'')+' '+(e.last_name||''))}</b>
          <div class="muted" style="font-size:11px">${esc(e.employee_no||'')}</div></td>
        <td><span class="tag ${isCash?'amber':'blue'}">${isCash?'💵 Cash':'🏦 Bank'}</span></td>
        <td style="font-size:12px">${r.bank_account?`${esc(r.bank_name||'')}<div class="muted">${esc(r.bank_account)}</div>`
          :'<span class="muted">No account on file</span>'}
          ${r.failure_reason?`<div style="color:#c0392b;font-size:11px">${esc(r.failure_reason)}</div>`:''}</td>
        <td class="right"><b>${peso(r.net_pay)}</b></td>
        <td><span class="tag ${PAY_STATUS[r.payment_status]||'gray'}">${esc(String(r.payment_status).replace('_',' '))}</span>
          ${r.paid_at?`<div class="muted" style="font-size:11px">${fdt(r.paid_at)}</div>`:''}
          ${r.payment_ref?`<div class="muted" style="font-size:11px">Ref ${esc(r.payment_ref)}</div>`:''}</td>
        <td class="right" style="white-space:nowrap">
          ${r.payment_status!=='paid'?`<button class="btn sm" onclick="prAct('${r.id}','mark_paid')">Mark Paid</button> `:''}
          ${(!isCash && r.payment_status!=='paid')?`<button class="btn danger sm" onclick="prAct('${r.id}','mark_failed')">Transfer Failed</button> `:''}
          ${(!isCash && r.payment_status!=='paid')?`<button class="btn ghost sm" onclick="prAct('${r.id}','switch_to_cash')">→ Cash</button>`:''}
          ${(isCash && r.payment_status!=='paid' && r.bank_account)?`<button class="btn ghost sm" onclick="prAct('${r.id}','switch_to_bank')">→ Bank</button>`:''}
          ${r.payment_status==='paid'?`<button class="btn ghost sm" onclick="prAct('${r.id}','reset')">Undo</button>`:''}
        </td></tr>`;
    }).join('')||'<tr><td colspan=6 class="empty">Nothing to show</td></tr>'}</tbody></table></div></div>`;
}
async function prAct(id,action){
  let ref=null, reason=null;
  if(action==='mark_paid'){ ref=prompt('Reference no. (bank txn / cash voucher) — optional:',''); if(ref===null)return; ref=ref.trim()||null; }
  if(action==='mark_failed'){ reason=prompt('Why did the bank transfer fail?','Bank payment not working'); if(reason===null)return; reason=reason.trim()||null; }
  if(action==='switch_to_cash'){ reason=prompt('Reason for paying in cash:','Bank payment not working'); if(reason===null)return; reason=reason.trim()||null; }
  const {error}=await sb.rpc('hris_payslip_pay',{p_ids:[id],p_action:action,p_ref:ref,p_reason:reason});
  if(error){toast('Error: '+error.message);return;}
  toast('Updated'); prLoad();
}
async function prBulk(action,scope){
  const rows = scope==='failed' ? (window._pr||[]).filter(r=>r.payment_status==='failed') : prRows();
  const ids=rows.filter(r=>r.payment_status!=='paid'||action==='mark_paid').map(r=>r.id);
  if(!ids.length){toast('Nothing to update');return;}
  let ref=null, reason=null;
  if(action==='mark_paid'){
    if(!confirm(`Mark ${ids.length} payment(s) as PAID?`))return;
    ref=prompt('Reference no. (optional):',''); if(ref===null)return; ref=ref.trim()||null;
  }
  if(action==='switch_to_cash'){
    if(!confirm(`Switch ${ids.length} payment(s) to CASH?`))return;
    reason='Bank payment not working';
  }
  const {data,error}=await sb.rpc('hris_payslip_pay',{p_ids:ids,p_action:action,p_ref:ref,p_reason:reason});
  if(error){toast('Error: '+error.message);return;}
  toast((data||0)+' payment(s) updated'); prLoad();
}
function prCSV(rows,head,mapFn,fname){
  if(!rows.length){toast('Nothing to export');return;}
  const q=v=>`"${String(v==null?'':v).replace(/"/g,'""')}"`;
  const csv=[head.map(q).join(',')].concat(rows.map(r=>mapFn(r).map(q).join(','))).join('\n');
  const b=new Blob([csv],{type:'text/csv'}),u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;
  a.download=fname;a.click();URL.revokeObjectURL(u);
}
function prBankFile(){
  const rows=(window._pr||[]).filter(r=>r.payment_method==='bank' && r.payment_status!=='paid');
  const p=(window._prPeriods||[]).find(x=>x.id===val('pr_period'))||{};
  prCSV(rows,['Employee No','Employee Name','Bank','Account Number','Amount'],
    r=>{const e=r.hris_employees||{};
        return [e.employee_no||'', ((e.first_name||'')+' '+(e.last_name||'')).trim(), r.bank_name||'', r.bank_account||'', Number(r.net_pay||0).toFixed(2)];},
    'bank_transfer_'+String(p.name||'payroll').replace(/\W+/g,'_')+'.csv');
}
function prCashList(){
  const rows=(window._pr||[]).filter(r=>r.payment_method==='cash' && r.payment_status!=='paid');
  const p=(window._prPeriods||[]).find(x=>x.id===val('pr_period'))||{};
  prCSV(rows,['Employee No','Employee Name','Amount','Reason for Cash','Date Received','Signature'],
    r=>{const e=r.hris_employees||{};
        return [e.employee_no||'', ((e.first_name||'')+' '+(e.last_name||'')).trim(),
                Number(r.net_pay||0).toFixed(2), r.failure_reason||'', '', ''];},

}

function auditExport(){

function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length)return [];
  const split=l=>{const out=[];let cur='',q=false;for(let i=0;i<l.length;i++){const c=l[i];if(c==='"'){ if(q&&l[i+1]==='"'){cur+='"';i++;} else q=!q; } else if(c===','&&!q){out.push(cur);cur='';} else cur+=c;}out.push(cur);return out.map(x=>x.trim());};
  const head=split(lines.shift());
  return lines.map(l=>{ const cells=split(l); const o={}; head.forEach((h,i)=>o[h]=(cells[i]||'').trim()); return o; });
}
function norm(s){return String(s||'').toLowerCase().replace(/[^a-z0-9]/g,'');}
async function bulkImport(){
  const inp=document.getElementById('bulkFile'); const f=inp&&inp.files[0]; if(!f){toast('Choose a CSV or Excel file');return;}
  // ensure we import into the chosen target company (aligns RLS + company tagging)
  const targetCo=(document.getElementById('bulkCompany')&&document.getElementById('bulkCompany').value)||ME.company;
  if(targetCo && targetCo!==ME.company){
    await sb.from('hris_user_prefs').upsert({user_id:ME.user.id,active_company_id:targetCo,updated_at:new Date().toISOString()},{onConflict:'user_id'});
    ME.company=targetCo; const m=(ME.companies||[]).find(c=>c.id===targetCo); if(m){ME.role=m.role;ME.companyName=m.name;} buildCompanySwitcher();
  }
  let rows; const nameLc=(f.name||'').toLowerCase();
  if(nameLc.endsWith('.xlsx')||nameLc.endsWith('.xls')){
    if(typeof XLSX==='undefined'){toast('Spreadsheet library still loading — try again in a moment');return;}
    const wb=XLSX.read(await f.arrayBuffer(),{type:'array',cellDates:true});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    let hi=aoa.findIndex(r=>Array.isArray(r)&&r.some(c=>['employeeid','employeeno','firstname','lastname'].includes(norm(c))));
    if(hi<0)hi=0;
    const head=(aoa[hi]||[]).map(x=>String(x));
    rows=aoa.slice(hi+1).filter(r=>Array.isArray(r)&&r.some(c=>String(c).trim()!==''))
      .map(r=>{const o={};head.forEach((h,i)=>{const v=r[i];o[h]=(v instanceof Date)?v.toISOString().slice(0,10):String(v==null?'':v).trim();});return o;});
  } else {
    rows=parseCSV(await f.text());
  }
  if(!rows||!rows.length){toast('No rows found in the file');return;}
  const [d,p,s]=await Promise.all([depts(),positions(),shifts()]);
  const dmap={}; d.forEach(x=>dmap[norm(x.name)]=x.id);
  const pmap={}; p.forEach(x=>pmap[norm(x.title)]=x.id);
  const smap={}; s.forEach(x=>smap[norm(x.name)]=x.id);
  // reuse shifts already defined for this company, keyed by their day-pattern
  const bulkShiftSig={};
  const {data:exShifts}=await sb.from('hris_shifts').select('id,days').eq('company_id',ME.company);
  (exShifts||[]).forEach(x=>{ if(x.days) bulkShiftSig[JSON.stringify(x.days)]=x.id; });
  let shiftsMade=0, banksFound=0;
  const supPending=[];   // {empNo, sup} — resolved to manager_id after every row is in
  const FMAP={employeeid:'employee_no',employeeno:'employee_no',lastname:'last_name',middlename:'middle_name',firstname:'first_name',username:'username',gender:'gender',civilstatus:'civil_status',birthday:'birth_date',birthdate:'birth_date',address:'address',location:'location',employeetype:'employee_type',employeestatus:'employment_status',status:'employment_status',hiredate:'date_hired',regularizationdate:'regularization_date',separationdate:'separation_date',scheduletype:'schedule_type',noofhourstowork:'hours_to_work',hourstowork:'hours_to_work',payrolltype:'rate_type',payrollpieid:'payroll_pie_id',biometricid:'biometric_id',sss:'sss_no',tin:'tin',philhealth:'philhealth_no',prcno:'prc_no',pagibigno:'pagibig_no',passportno:'passport_no',extension:'extension',basesalary:'basic_salary',basicsalary:'basic_salary',deminimis:'de_minimis_amt',transportation:'transportation_amt',meal:'meal_amt',communication:'communication_amt',travel:'travel_amt',others:'others_amt',skype:'skype',contact:'mobile',mobile:'mobile',email:'email',clientname:'client_name',jobcode:'job_code',jobgrade:'job_grade',billability:'billability',reasonforleaving:'reason_for_leaving',userlevel:'user_level',approver2:'approver_2',approver3:'approver_3',approver4:'approver_4',approver5:'approver_5',taxstatus:'tax_status'};
  const numFields=new Set(['basic_salary','hours_to_work','de_minimis_amt','transportation_amt','meal_amt','communication_amt','travel_amt','others_amt']);
  const dateFields=new Set(['birth_date','date_hired','regularization_date','separation_date']);
  const toDate=v=>{ v=String(v||'').trim(); if(!v)return null; if(/^\d{4}-\d{2}-\d{2}/.test(v))return v.slice(0,10); const m=v.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})$/); if(m)return `${m[3]}-${String(m[1]).padStart(2,'0')}-${String(m[2]).padStart(2,'0')}`; const d=new Date(v); return (!isNaN(d)&&/\d{4}/.test(v))?d.toISOString().slice(0,10):null; };
  let ok=0,fail=0,skip=0; const errs=[];
  for(const r of rows){
    const o={}; Object.keys(r).forEach(k=>{o[norm(k)]=r[k];});
    const empNo=o.employeeid||o.employeeno, fn=o.firstname, ln=o.lastname;
    if(!empNo||!fn||!ln){fail++;errs.push('Skipped row (missing Employee ID / First / Last name)');continue;}
    const rec={company_id:ME.company||null};
    Object.keys(FMAP).forEach(nk=>{ let raw=o[nk];
      if(raw==null||raw===''||norm(raw)==='notyetset'||norm(raw)==='na'||norm(raw)==='none')return;
      const field=FMAP[nk]; let v=raw;
      if(numFields.has(field)){ v=Number(String(v).replace(/[^0-9.\-]/g,''))||0; }
      else if(dateFields.has(field)){ v=toDate(v); if(v==null)return; }
      rec[field]=v; });
    if(o.department){ const dk=norm(o.department);
      if(!dmap[dk]){ const {data:dd}=await sb.from('hris_departments').insert({name:o.department,company_id:ME.company||null}).select('id').maybeSingle(); if(dd&&dd.id){dmap[dk]=dd.id;CACHE.depts=null;} }
      rec.department_id=dmap[dk]||null; }
    if(o.position){ const pk=norm(o.position);
      if(!pmap[pk]){ const {data:pp}=await sb.from('hris_positions').insert({title:o.position,department_id:rec.department_id||null,company_id:ME.company||null}).select('id').maybeSingle(); if(pp&&pp.id){pmap[pk]=pp.id;CACHE.positions=null;} }
      rec.position_id=pmap[pk]||null; }
    // Schedule: Sprout exports a per-weekday block ("Monday: 08:00 AM - 05:00 PM … Sunday: rest day"),
    // not a shift name. Parse it, reuse/create the matching shift, and assign it.
    if(o.schedule){
      const days=parseSchedule(o.schedule);
      if(days){
        const sig=JSON.stringify(days);
        if(!bulkShiftSig[sig]){
          const nm=scheduleName(days);
          const work=[]; for(let dd=0;dd<7;dd++) if(days[dd]) work.push(dd);
          const first=work.length?days[work[0]]:{start:'08:00',end:'17:00'};
          const {data:ns}=await sb.from('hris_shifts').insert({
            company_id:ME.company, name:nm, days, work_days:work,
            start_time:first.start, end_time:first.end,
            break_minutes:60, grace_minutes:15,
            is_night_shift:first.end<first.start
          }).select('id').single();
          if(ns&&ns.id){ bulkShiftSig[sig]=ns.id; shiftsMade++; }
        }
        rec.shift_id=bulkShiftSig[sig]||null;
      } else {
        rec.shift_id=smap[norm(o.schedule)]||null;   // a plain shift name still works
      }
    }
    // Bank details: Sprout packs them into one cell — "Bank: BDO\nAccount number: 1234…"
    const bankRaw=String(o.bankaccounts||o.bankaccount||o.bank||'');
    if(bankRaw){
      const bm=bankRaw.match(/bank\s*:\s*([^\n\r]*)/i);
      const am=bankRaw.match(/account\s*number\s*:\s*([^\n\r]*)/i) || bankRaw.match(/account\s*:\s*([^\n\r]*)/i);
      const acct=(am&&am[1].trim().replace(/\s+/g,''))||'';
      if(acct){ rec.bank_account=acct; rec.bank_name=(bm&&bm[1].trim())||null; rec.payment_method='bank'; banksFound++; }
    }
    if(rec.rate_type) rec.rate_type=(String(rec.rate_type).toLowerCase()==='daily'?'daily':'monthly');
    rec.employee_no=empNo; rec.first_name=fn; rec.last_name=ln;
    // Supervisor comes through as a NAME, not an ID — resolve it after everyone exists.
    const supRaw=String(o.immediatesupervisor||o.supervisor||o.reportsto||'').trim();
    if(supRaw && !/^(n\/a|na|none|not yet set)$/i.test(supRaw)) supPending.push({empNo, sup:supRaw});
    const upd=document.getElementById('bulkUpdate')&&document.getElementById('bulkUpdate').checked;
    const {error}= upd
      ? await sb.from('hris_employees').upsert(rec,{onConflict:'company_id,employee_no'})
      : await sb.from('hris_employees').insert(rec);
    if(error){ if(!upd && /duplicate|unique/i.test(error.message)){skip++;} else {fail++;errs.push(`${empNo}: ${error.message}`);} } else ok++;
  }
  CACHE.shifts=null;

  // ---- second pass: link each employee to their Immediate Supervisor by name ----
  let supLinked=0; const supMissed=new Set();
  if(supPending.length){
    const {data:all}=await sb.from('hris_employees')
      .select('id,employee_no,first_name,middle_name,last_name').eq('company_id',ME.company);
    const byName={}, byNo={};
    (all||[]).forEach(e=>{
      byNo[norm(e.employee_no)]=e.id;
      const f=(e.first_name||'').trim(), l=(e.last_name||'').trim(), m=(e.middle_name||'').trim();
      [`${f} ${l}`, `${l} ${f}`, `${l}, ${f}`, `${f} ${m} ${l}`].forEach(k=>{
        const nk=norm(k); if(nk && !byName[nk]) byName[nk]=e.id;
      });
    });
    for(const p of supPending){
      const empId=byNo[norm(p.empNo)]; if(!empId) continue;
      const mgrId=byName[norm(p.sup)] || byNo[norm(p.sup)];
      if(!mgrId){ supMissed.add(p.sup); continue; }
      if(mgrId===empId) continue;                       // can't supervise yourself
      const {error}=await sb.from('hris_employees').update({manager_id:mgrId}).eq('id',empId);
      if(!error) supLinked++;
    }
  }

  document.getElementById('bulkResult').innerHTML=`<div class="panel pad"><b style="color:var(--green-d)">Imported/Updated ${ok}</b> &nbsp;·&nbsp; Skipped ${skip} &nbsp;·&nbsp; Failed ${fail}
    ${shiftsMade?`<div style="margin-top:6px">🗓️ <b>${shiftsMade}</b> work schedule(s) created from the Schedule column and assigned to each employee.</div>`:''}
    ${banksFound?`<div style="margin-top:4px">🏦 <b>${banksFound}</b> bank account(s) captured — those employees will be paid by bank transfer.</div>`:''}
    ${supLinked?`<div style="margin-top:4px">👤 <b>${supLinked}</b> employee(s) linked to their Immediate Supervisor.</div>`:''}
    ${supMissed.size?`<div class="muted" style="font-size:12px;margin-top:6px;color:#b45309">
       ${supMissed.size} supervisor name(s) didn't match anyone in this company (e.g. ${[...supMissed].slice(0,5).map(esc).join(', ')}).
       They may work in a different company, or their name is spelled differently.</div>`:''}
    ${errs.length?`<div class="muted" style="font-size:12px;margin-top:8px">${errs.slice(0,12).map(esc).join('<br>')}</div>`:''}</div>`;
  toast(`Imported/updated ${ok}, skipped ${skip}, failed ${fail}`);
}

// ---- Adjust employee work schedule (per-date override) ----
function schedAdjust(){
  const emps=window._attEmps||[];
  Promise.resolve(shifts()).then(sh=>{
  openModal(`<div class="mh"><h3>Adjust Work Schedule</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="mb"><p class="muted">Assign a different work schedule to an employee for a date range. DTR tardiness and overtime recompute against the new schedule.</p>
    <div class="grid2">
      <div class="fld" style="grid-column:1/3"><label>Employee</label><select id="sa_emp">${emps.map(e=>`<option value="${e.id}">${esc(e.first_name+' '+e.last_name)}</option>`).join('')}</select></div>
      <div class="fld" style="grid-column:1/3"><label>Work Schedule</label><select id="sa_shift">${sh.map(s=>`<option value="${s.id}">${esc(s.name)} (${s.start_time.slice(0,5)}–${s.end_time.slice(0,5)})</option>`).join('')}</select></div>
      <div class="fld"><label>From</label><input id="sa_from" type="date" value="${todayStr()}"></div>
      <div class="fld"><label>To</label><input id="sa_to" type="date" value="${todayStr()}"></div>
    </div></div>
    <div class="mf"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn" onclick="saveSchedule()">Apply</button></div>`);
  });
}
async function saveSchedule(){
  const emp=val('sa_emp'),shift=val('sa_shift'),f=val('sa_from'),t=val('sa_to');
  if(!emp||!shift||!f||!t){toast('Fill in all fields');return;}
  const rows=[]; let cur=new Date(f+'T00:00:00'); const end=new Date(t+'T00:00:00');
  if(end<cur){toast('End date is before start date');return;}
  for(;cur<=end;cur.setDate(cur.getDate()+1)){ const ds=`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`; rows.push({employee_id:emp,work_date:ds,shift_id:shift}); }
  if(rows.length>62){toast('Range too large (max ~60 days)');return;}
  const {error}=await sb.from('hris_schedule_overrides').upsert(rows,{onConflict:'employee_id,work_date'});
  if(error){toast('Error: '+error.message);return;}
  for(const r of rows){ await sb.rpc('hris_recompute_dtr',{p_employee:emp,p_date:r.work_date}); }
  closeModal();toast('Schedule adjusted for '+rows.length+' day(s)');loadDTR();
}

  const [{data},{data:emps},{data:lt}]=await Promise.all([
    sb.from('hris_loans').select('*,hris_employees(first_name,last_name,employee_no)').order('created_at',{ascending:false}),
    sb.from('hris_employees').select('id,first_name,last_name,employee_no').eq('is_active',true).order('first_name'),
    sb.from('hris_loan_types').select('name').order('name')
  ]);
  window._loans=data||[]; window._loanEmps=emps||[]; window._loanTypes=(lt||[]).map(x=>x.name);

      Upload loan balances from Sprout including payments already made — enter the <b>original principal</b>, <b>amount already paid</b>, and the <b>remaining balance</b>. The per-payroll amortization is deducted automatically and the balance drops as payroll is paid; the loan closes when fully paid.

      <td>${esc((l.hris_employees?.first_name||'')+' '+(l.hris_employees?.last_name||''))}<div class="muted" style="font-size:11px">${esc(l.hris_employees?.employee_no||'')}</div></td>

function loanTag(s){return `<span class="tag ${{active:'blue',paid:'green',on_hold:'amber'}[s]||'gray'}">${s}</span>`;}
function loanForm(i){ const l=(i==null?{}:(window._loans||[])[i])||{};
  const emps=window._loanEmps||[];
  openModal(`<div class="mh"><h3>${l.id?'Edit':'New'} Loan</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="mb"><div class="grid2">
      <div class="fld" style="grid-column:1/3"><label>Employee*</label><select id="ln_emp" ${l.id?'disabled':''}>${emps.map(e=>`<option value="${e.id}" ${l.employee_id===e.id?'selected':''}>${esc(e.first_name+' '+e.last_name)}</option>`).join('')}</select></div>
      <div class="fld"><label>Loan Type*</label>
        <select id="ln_type" onchange="document.getElementById('ln_type_new_wrap').style.display=this.value==='__new__'?'block':'none'">
          ${(window._loanTypes||[]).map(t=>`<option value="${esc(t)}" ${l.loan_type===t?'selected':''}>${esc(t)}</option>`).join('')}

        </select>

      <div class="fld"><label>Original Principal</label><input id="ln_prin" type="number" step="0.01" value="${l.principal||0}" oninput="loanCalc()"></div>
      <div class="fld"><label>Amount Already Paid</label><input id="ln_paid" type="number" step="0.01" value="${l.paid_amount||0}" oninput="loanCalc()"></div>
      <div class="fld"><label>Remaining Balance*</label><input id="ln_bal" type="number" step="0.01" value="${l.balance!=null?l.balance:''}"></div>
      <div class="fld"><label>Amortization / payroll*</label><input id="ln_amort" type="number" step="0.01" value="${l.amortization||0}"></div>
      <div class="fld"><label>Start Date</label><input id="ln_start" type="date" value="${l.start_date||''}"></div>
      <div class="fld"><label>Status</label><select id="ln_status">${['active','on_hold','paid'].map(x=>`<option ${l.status===x?'selected':''}>${x}</option>`).join('')}</select></div>
    </div></div>
    <div class="mf">${l.id?`<button class="btn danger" onclick="loanDel('${l.id}')">Delete</button>`:''}<button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn" onclick="loanSave('${l.id||''}')">Save</button></div>`);
}
function loanCalc(){ const p=Number(val('ln_prin'))||0, pd=Number(val('ln_paid'))||0; const b=document.getElementById('ln_bal'); if(b&&!b.value)b.value=Math.max(0,p-pd); }
async function loanSave(id){
  const emp=val('ln_emp'); const bal=val('ln_bal');
  let typeName=val('ln_type'); if(typeName==='__new__') typeName=val('ln_type_new');
  if(!typeName){toast('Loan type required');return;}
  // auto-add a brand-new loan type to the database for reuse
  if(!(window._loanTypes||[]).includes(typeName)){
    await sb.from('hris_loan_types').insert({name:typeName,company_id:ME.company||null});
    window._loanTypes=[...(window._loanTypes||[]),typeName];
  }
  const rec={employee_id:emp,loan_type:typeName,reference_no:val('ln_ref')||null,
    principal:Number(val('ln_prin'))||0,paid_amount:Number(val('ln_paid'))||0,
    balance:bal!==''?Number(bal):(Math.max(0,(Number(val('ln_prin'))||0)-(Number(val('ln_paid'))||0))),
    amortization:Number(val('ln_amort'))||0,start_date:val('ln_start')||null,status:val('ln_status'),
    company_id:ME.company||null};
  const {error}=await (id?sb.from('hris_loans').update(rec).eq('id',id):sb.from('hris_loans').insert(rec));
  if(error){toast('Error: '+error.message);return;} closeModal();toast('Loan saved');go('loans'); }
async function loanDel(id){ if(!confirm('Delete this loan record?'))return; const {error}=await sb.from('hris_loans').delete().eq('id',id);
  if(error){toast('Error: '+error.message);return;} closeModal();toast('Deleted');go('loans'); }
function loanPrint(i){

  const co=ME.companyName||'The Company';
  const terms=(l.amortization>0)?Math.ceil(Number(l.balance)/Number(l.amortization)):0;
  const today=new Date().toLocaleDateString('en-PH',{year:'numeric',month:'long',day:'numeric'});
  const html=`<!doctype html><html><head><meta charset="utf-8"><title>Loan Agreement — ${esc(nm)}</title>
    <style>@page{size:A4 portrait;margin:22mm}
      *{box-sizing:border-box} body{font-family:'Segoe UI',Arial,sans-serif;color:#1f2933;font-size:12.5px;line-height:1.55}
      h1{font-size:18px;text-align:center;margin:0 0 2px} .sub{text-align:center;color:#555;margin-bottom:18px;font-size:11px}
      .co{text-align:center;font-weight:800;font-size:15px}
      table.d{width:100%;border-collapse:collapse;margin:14px 0}
      table.d td{padding:6px 8px;border:1px solid #ccc;font-size:12px}
      table.d td.k{background:#f3f5f7;font-weight:600;width:38%}
      .terms{margin:14px 0} .terms li{margin-bottom:7px}
      .sign{display:flex;justify-content:space-between;margin-top:48px;gap:40px}
      .sign .box{flex:1;text-align:center} .sign .line{border-top:1px solid #1f2933;padding-top:5px;margin-top:40px}
      .muted{color:#666}</style></head>
    <body>
      <div class="co">${esc(co)}</div>
      <h1>Employee Loan Agreement</h1>
      <div class="sub">Salary Deduction Authorization &amp; Promissory Note</div>
      <p>This Loan Agreement is entered into on <b>${today}</b> between <b>${esc(co)}</b> ("the Company") and <b>${esc(nm)}</b> (Employee No. ${esc(l.hris_employees?.employee_no||'—')}), hereinafter referred to as the "Borrower".</p>
      <table class="d">
        <tr><td class="k">Loan Type</td><td>${esc(l.loan_type)}</td></tr>
        <tr><td class="k">Reference No.</td><td>${esc(l.reference_no||'—')}</td></tr>
        <tr><td class="k">Original Principal</td><td>${peso(l.principal)}</td></tr>
        <tr><td class="k">Amount Previously Paid</td><td>${peso(l.paid_amount)}</td></tr>
        <tr><td class="k">Outstanding Balance</td><td><b>${peso(l.balance)}</b></td></tr>
        <tr><td class="k">Amortization per Payroll</td><td>${peso(l.amortization)}</td></tr>
        <tr><td class="k">Estimated Remaining Payments</td><td>${terms||'—'}</td></tr>
        <tr><td class="k">Start Date</td><td>${l.start_date?fdate(l.start_date):'—'}</td></tr>
      </table>
      <div class="terms"><b>Terms and Conditions</b>
        <ol>
          <li>The Borrower authorizes the Company to deduct the amortization amount stated above from their salary each payroll period until the outstanding balance is fully settled.</li>
          <li>The Borrower may prepay the loan in part or in full at any time without penalty.</li>
          <li>Should the Borrower's employment end for any reason, any remaining outstanding balance shall become immediately due and may be deducted from the Borrower's final pay and/or any amounts owed by the Company to the Borrower.</li>
          <li>The amounts recorded herein reflect payments already made prior to this agreement; the Outstanding Balance is the remaining amount payable.</li>
          <li>This authorization remains in effect until the loan is fully paid or superseded by a written agreement signed by both parties.</li>
        </ol>
      </div>
      <div class="sign">
        <div class="box"><div class="line">Borrower (Employee)</div><div class="muted">${esc(nm)}</div></div>
        <div class="box"><div class="line">Approved by</div><div class="muted">Authorized Representative, ${esc(co)}</div></div>
      </div>
      <p class="muted" style="margin-top:26px;font-size:10px">Generated ${today}. This document is a salary-deduction authorization; consult your HR department for the governing company loan policy.</p>
    </body></html>`;
  const w=window.open('','_blank');
  if(!w){toast('Please allow pop-ups to print the loan agreement');return;}
  w.document.write(html); w.document.close(); w.focus(); setTimeout(()=>{try{w.print();}catch(e){}},300);
}
function loanBulk(){
  openModal(`<div class="mh"><h3>Bulk Upload Loans</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="mb"><p class="muted">CSV columns: <code>employee_no, loan_type, reference_no, principal, paid_amount, balance, amortization, start_date, status</code>. Employees are matched by employee number within the current company. If balance is blank it's computed as principal − paid_amount.</p>
      <button class="btn ghost sm" onclick="loanTemplate()">Download Template</button>
      <div style="margin-top:12px"><input type="file" id="loanFile" accept=".csv"></div>
      <div id="loanResult" style="margin-top:14px"></div></div>
    <div class="mf"><button class="btn ghost" onclick="closeModal()">Close</button><button class="btn" onclick="loanImport()">Import</button></div>`);
}
function loanTemplate(){
  const cols=['employee_no','loan_type','reference_no','principal','paid_amount','balance','amortization','start_date','status'];
  const csv=cols.join(',')+'\nEMP-0002,SSS Loan,SSS-2025-001,24000,8000,16000,2000,2025-06-15,active';
  const b=new Blob([csv],{type:'text/csv'}),u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='loans_template.csv';a.click();URL.revokeObjectURL(u);
}
async function loanImport(){
  const inp=document.getElementById('loanFile'); const f=inp&&inp.files[0]; if(!f){toast('Choose a CSV');return;}
  const rows=parseCSV(await f.text()); if(!rows.length){toast('No rows');return;}
  const {data:emps}=await sb.from('hris_employees').select('id,employee_no');
  const emap={}; (emps||[]).forEach(e=>emap[(e.employee_no||'').toLowerCase()]=e.id);
  let ok=0,fail=0; const errs=[];
  for(const r of rows){
    const eid=emap[(r.employee_no||'').toLowerCase()];
    if(!eid){fail++;errs.push(`${r.employee_no||'?'}: employee not found in this company`);continue;}
    const prin=Number(r.principal)||0, paid=Number(r.paid_amount)||0;
    const rec={employee_id:eid,loan_type:r.loan_type||'Loan',reference_no:r.reference_no||null,
      principal:prin,paid_amount:paid,balance:r.balance!==''&&r.balance!=null?Number(r.balance):Math.max(0,prin-paid),
      amortization:Number(r.amortization)||0,start_date:r.start_date||null,status:r.status||'active',company_id:ME.company||null};
    const {error}=await sb.from('hris_loans').insert(rec);
    if(error){fail++;errs.push(`${r.employee_no}: ${error.message}`);} else ok++;
  }
  document.getElementById('loanResult').innerHTML=`<div class="panel pad"><b style="color:var(--green-d)">Imported ${ok}</b> · Failed ${fail}${errs.length?`<div class="muted" style="font-size:12px;margin-top:8px">${errs.slice(0,12).map(esc).join('<br>')}</div>`:''}</div>`;
  toast(`Imported ${ok}, failed ${fail}`); window._loans=null;
}

async function elSetCompany(cid){
  if(!cid||cid===ME.company)return;
  await sb.from('hris_user_prefs').upsert({user_id:ME.user.id,active_company_id:cid,updated_at:new Date().toISOString()},{onConflict:'user_id'});
  ME.company=cid; const m=(ME.companies||[]).find(c=>c.id===cid); if(m){ME.role=m.role;ME.companyName=m.name;}
  buildCompanySwitcher(); CACHE.depts=null; CACHE.positions=null; CACHE.shifts=null;
  toast('Switched to '+(m?m.name:'company')); go('emplist');
}
function elChips(){ document.getElementById('el_chips').innerHTML=EMPCOLS.map(c=>`<button class="chip ${window._elSel.has(c.k)?'on':''}" onclick="elToggle('${c.k}')">${esc(c.l)}</button>`).join(''); }
function elToggle(k){ if(window._elSel.has(k))window._elSel.delete(k); else window._elSel.add(k); elChips(); }
function elAll(on){ window._elSel=new Set(on?EMPCOLS.map(c=>c.k):[]); elChips(); }
function elRows(){
  const dept=val('el_dept'), loc=val('el_loc'), emp=val('el_emp'), excl=document.getElementById('el_excl')&&document.getElementById('el_excl').checked;
  return (window._elEmps||[]).filter(e=>(!dept||e.department_id===dept)&&(!loc||e.location===loc)&&(!emp||e.id===emp)&&(!excl||e.is_active));
}
function elSearch(){
  const cols=EMPCOLS.filter(c=>window._elSel.has(c.k)); const rows=elRows();
  if(!cols.length){toast('Select at least one column');return;}
  const box=document.getElementById('el_result'); box.style.display='block';
  box.innerHTML=`<div class="ph"><h3>${rows.length} Employee(s)</h3></div>
    <div class="pb" style="overflow:auto"><table><thead><tr>${cols.map(c=>`<th>${esc(c.l)}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(e=>`<tr>${cols.map(c=>{let v; try{v=c.f(e);}catch(_){v='';} return `<td>${esc(v==null?'':v)}</td>`;}).join('')}</tr>`).join('')||`<tr><td colspan="${cols.length}" class="empty">No employees</td></tr>`}</tbody></table></div>`;
}
function elCSV(){
  const cols=EMPCOLS.filter(c=>window._elSel.has(c.k)); const rows=elRows();
  if(!cols.length){toast('Select at least one column');return;}
  const q=v=>`"${String(v==null?'':v).replace(/"/g,'""')}"`;
  const csv=[cols.map(c=>q(c.l)).join(','),...rows.map(e=>cols.map(c=>{let v; try{v=c.f(e);}catch(_){v='';} return q(v);}).join(','))].join('\n');
  const b=new Blob([csv],{type:'text/csv'}),u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='employee_list_report.csv';a.click();URL.revokeObjectURL(u);
}
function elFlat(){
  const cols=EMPCOLS.filter(c=>window._elSel.has(c.k)); const rows=elRows();
  if(!cols.length){toast('Select at least one column');return;}
  const cell=v=>String(v==null?'':v).replace(/[\r\n|]/g,' ').trim(); // pipe-delimited, no embedded delimiters/newlines
  const out=[cols.map(c=>cell(c.l)).join('|'),...rows.map(e=>cols.map(c=>{let v; try{v=c.f(e);}catch(_){v='';} return cell(v);}).join('|'))].join('\r\n');
  const b=new Blob([out],{type:'text/plain'}),u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='employee_list_report.txt';a.click();URL.revokeObjectURL(u);
}

VIEWS.bulkaction = async ()=>{
  const [{data:emps},d,pg]=await Promise.all([
    sb.from('hris_employees').select('id,first_name,last_name,employee_no,department_id,is_active,pay_group_id').order('employee_no'),
    depts(),
    payGroups()
  ]);
  window._baEmps=emps||[]; window._baGroups=pg||[];
  $('#view').innerHTML=`<div class="panel pad">
    <div class="row" style="align-items:flex-end">
      <div class="fld"><label>Department</label><select id="ba_dept" onchange="baRender()"><option value="">All</option>${d.map(x=>`<option value="${x.id}">${esc(x.name)}</option>`).join('')}</select></div>
      <div class="fld"><label>Pay Group</label><select id="ba_pg" onchange="baRender()">
        <option value="">All</option>
        ${pg.map(g=>`<option value="${g.id}">${esc(g.name)}${g.is_confidential?' 🔒':''}</option>`).join('')}
        <option value="_none">— not assigned —</option></select></div>
      <div class="fld"><label>Action</label><select id="ba_action" onchange="baActionChange()">
        <option value="paygroup">Move to Pay Group</option>
        <option value="activate">Set Active</option><option value="deactivate">Set Inactive</option>
        <option value="dept">Set Department</option><option value="pos">Set Position</option>
        <option value="status">Set Employment Status</option><option value="location">Set Location</option>
        <option value="company">Move to Company</option></select></div>
      <div class="fld" id="ba_valwrap"></div>
      <div style="flex:0"><button class="btn" onclick="baApply()">Apply to Selected</button></div>
    </div>
    <div style="margin-top:10px"><label style="font-weight:500"><input type="checkbox" id="ba_all" onclick="document.querySelectorAll('.back').forEach(x=>x.checked=this.checked)" style="width:auto;margin-right:6px">Select all shown</label></div>
    <div class="pb" id="ba_list" style="margin-top:8px"></div>
  </div>`;
  baActionChange(); baRender();
};
function baRender(){
  const dept=val('ba_dept'), pgf=val('ba_pg');
  const gmap={}; (window._baGroups||[]).forEach(g=>gmap[g.id]=g);
  const rows=(window._baEmps||[])
    .filter(e=>!dept||e.department_id===dept)
    .filter(e=>!pgf || (pgf==='_none' ? !e.pay_group_id : e.pay_group_id===pgf));
  const gname=e=>{
    const g=gmap[e.pay_group_id];
    if(!g) return '<span class="muted">— not assigned —</span>';
    return `${esc(g.name)}${g.is_confidential?' <span class="tag amber" style="font-size:10px">🔒</span>':''}`;
  };
  document.getElementById('ba_list').innerHTML=`<div class="muted" style="font-size:12px;margin-bottom:6px">${rows.length} employee(s) shown</div>
    <table><thead><tr><th style="width:26px"></th><th>Emp No</th><th>Name</th><th>Pay Group</th><th>Status</th></tr></thead>
    <tbody>${rows.map(e=>`<tr><td><input type="checkbox" class="back" value="${e.id}"></td><td>${esc(e.employee_no)}</td><td>${esc(e.first_name+' '+e.last_name)}</td><td style="font-size:12.5px">${gname(e)}</td><td>${e.is_active?'<span class="tag green">Active</span>':'<span class="tag gray">Inactive</span>'}</td></tr>`).join('')||'<tr><td colspan=5 class="empty">No employees</td></tr>'}</tbody></table>`;
}
function baActionChange(){
  const a=val('ba_action'); const w=document.getElementById('ba_valwrap'); if(!w)return;
  Promise.all([depts(),positions()]).then(([d,p])=>{
    if(a==='paygroup') w.innerHTML=`<label>Move to Pay Group</label><select id="ba_val">
        <option value="">— remove from any pay group —</option>
        ${(window._baGroups||[]).map(g=>`<option value="${g.id}">${esc(g.name)}${g.is_confidential?' 🔒':''}</option>`).join('')}</select>`;
    else if(a==='dept') w.innerHTML=`<label>New Department</label><select id="ba_val"><option value="">—</option>${d.map(x=>`<option value="${x.id}">${esc(x.name)}</option>`).join('')}</select>`;
    else if(a==='pos') w.innerHTML=`<label>New Position</label><select id="ba_val"><option value="">—</option>${p.map(x=>`<option value="${x.id}">${esc(x.title)}</option>`).join('')}</select>`;
    else if(a==='status') w.innerHTML=`<label>Status</label><select id="ba_val">${['Probationary','Regular','Contractual','Resigned'].map(x=>`<option>${x}</option>`).join('')}</select>`;
    else if(a==='location') w.innerHTML=`<label>Location</label><input id="ba_val">`;
    else if(a==='company') w.innerHTML=`<label>Company</label><select id="ba_val">${(ME.companies||[]).filter(c=>c.id!==ME.company).map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}</select>`;
    else w.innerHTML='<label>&nbsp;</label><div class="muted" style="font-size:12px;padding-top:9px">No value needed</div>';
  });
}
async function baApply(){
  const ids=Array.from(document.querySelectorAll('.back:checked')).map(x=>x.value);
  if(!ids.length){toast('Select employees first');return;}
  const a=val('ba_action'), v=val('ba_val');
  if(['dept','pos','status','company'].includes(a) && !v){toast('Choose a value for the action');return;}
  if(a==='paygroup') CACHE.payGroups=null;
  let ok=0,fail=0;
  for(const id of ids){
    let res;
    if(a==='activate') res=await sb.from('hris_employees').update({is_active:true}).eq('id',id);
    else if(a==='deactivate') res=await sb.from('hris_employees').update({is_active:false}).eq('id',id);
    else if(a==='dept') res=await sb.from('hris_employees').update({department_id:v}).eq('id',id);
    else if(a==='pos') res=await sb.from('hris_employees').update({position_id:v}).eq('id',id);
    else if(a==='status') res=await sb.from('hris_employees').update({employment_status:v}).eq('id',id);
    else if(a==='location') res=await sb.from('hris_employees').update({location:v||null}).eq('id',id);
    else if(a==='paygroup') res=await sb.from('hris_employees').update({pay_group_id:v||null}).eq('id',id);
    else if(a==='company') res=await sb.rpc('hris_set_employee_company',{p_emp:id,p_company:v});
    if(res&&res.error)fail++; else ok++;
  }
  toast(`Updated ${ok}${fail?', '+fail+' failed':''}`); go('bulkaction');
}

function dtForm(i){ const t=(i==null?{}:(window._dts||[])[i])||{};

async function dtSave(id){ const rec={name:val('dt_name'),body:val('dt_body')||null,company_id:ME.company||null};

  const body=String(t.body||'').replace(/\{(\w+)\}/g,(m,k)=>map[k]!=null?map[k]:m);

// ================= PULSE =================
VIEWS.pulse = async ()=>{
  const {data:pulses}=await sb.from('hris_pulse').select('*').order('created_at',{ascending:false});
  const active=(pulses||[]).find(p=>p.is_active);
  let respHtml='';
  if(active){
    let mine=null;
    if(ME.employee_id){const {data}=await sb.from('hris_pulse_responses').select('*').eq('pulse_id',active.id).eq('employee_id',ME.employee_id).maybeSingle();mine=data;}
    respHtml=`<div class="panel pad"><h3 style="margin-top:0">${esc(active.question)}</h3>
      ${mine?`<div class="muted">You answered: <b>${mine.score}/5</b>${mine.comment?' — “'+esc(mine.comment)+'”':''}</div>`:`
        <div class="row" style="align-items:flex-end;max-width:560px">
          <div class="fld" style="max-width:130px"><label>Score (1–5)</label><select id="pl_score">${[5,4,3,2,1].map(n=>`<option>${n}</option>`).join('')}</select></div>
          <div class="fld"><label>Comment (optional)</label><input id="pl_comment"></div>
          <div style="flex:0"><button class="btn" onclick="pulseRespond('${active.id}')">Submit</button></div>
        </div>`}</div>`;
  } else respHtml=`<div class="panel pad muted">No active pulse right now.</div>`;
  let adminHtml='';
  if(isStaff()){
    let res=[];
    if(active){const {data}=await sb.from('hris_pulse_responses').select('score,comment').eq('pulse_id',active.id);res=data||[];}
    const avg=res.length?(res.reduce((s,r)=>s+(r.score||0),0)/res.length).toFixed(2):'—';
    $('#vaction').innerHTML=`<button class="btn" onclick="pulseNew()">+ New Pulse</button>`;
    adminHtml=`<div class="panel"><div class="ph"><h3>Results${active?' — '+esc(active.question):''}</h3><div class="muted">Avg ${avg} · ${res.length} responses</div></div>
      <div class="pb"><table><tbody>${res.filter(r=>r.comment).map(r=>`<tr><td style="width:60px"><b>${r.score}/5</b></td><td>${esc(r.comment)}</td></tr>`).join('')||'<tr><td class="empty">No comments yet</td></tr>'}</tbody></table></div></div>
      <div class="panel"><div class="ph"><h3>All Pulses</h3></div><div class="pb"><table><tbody>${(pulses||[]).map(p=>`<tr><td>${esc(p.question)}</td><td>${p.is_active?'<span class="tag green">Active</span>':'<span class="tag gray">Closed</span>'}</td><td class="right"><button class="btn ghost sm" onclick="pulseToggle('${p.id}',${p.is_active})">${p.is_active?'Close':'Activate'}</button></td></tr>`).join('')||'<tr><td class="empty">None</td></tr>'}</tbody></table></div></div>`;
  }
  $('#view').innerHTML=respHtml+adminHtml;
};
function pulseNew(){ openModal(`<div class="mh"><h3>New Pulse</h3><button class="x" onclick="closeModal()">×</button></div>
  <div class="mb"><div class="fld"><label>Question*</label><input id="pn_q" placeholder="e.g. How was your work week?"></div></div>
  <div class="mf"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn" onclick="pulseCreate()">Create &amp; Activate</button></div>`); }
async function pulseCreate(){ const q=val('pn_q'); if(!q){toast('Enter a question');return;}
  await sb.from('hris_pulse').update({is_active:false}).eq('company_id',ME.company).eq('is_active',true);
  const {error}=await sb.from('hris_pulse').insert({question:q,is_active:true,company_id:ME.company||null});
  if(error){toast(error.message);return;} closeModal();toast('Pulse created');go('pulse'); }
async function pulseToggle(id,active){ if(!active){ await sb.from('hris_pulse').update({is_active:false}).eq('company_id',ME.company).eq('is_active',true); }
  const {error}=await sb.from('hris_pulse').update({is_active:!active}).eq('id',id); if(error){toast(error.message);return;} go('pulse'); }
async function pulseRespond(pid){ if(!ME.employee_id){toast('No employee record is linked to your account');return;}

async function readSheet(f){
  const nameLc=(f.name||'').toLowerCase();
  if(nameLc.endsWith('.xlsx')||nameLc.endsWith('.xls')){
    if(typeof XLSX==='undefined')return null;
    const wb=XLSX.read(await f.arrayBuffer(),{type:'array',cellDates:true});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    let hi=aoa.findIndex(r=>Array.isArray(r)&&r.some(c=>['employeeid','employeeno','date','timein','biometricid','logtime','inoutmode'].includes(norm(c))));
    if(hi<0)hi=0;
    const head=(aoa[hi]||[]).map(x=>String(x));
    return aoa.slice(hi+1).filter(r=>Array.isArray(r)&&r.some(c=>String(c).trim()!==''))
      .map(r=>{const o={};head.forEach((h,i)=>{const v=r[i];o[h]=(v instanceof Date)?v.toISOString():String(v==null?'':v).trim();});return o;});
  }
  return parseCSV(await f.text());
}
function gToDate(v){ v=String(v||'').trim(); if(!v)return null; if(/^\d{4}-\d{2}-\d{2}/.test(v))return v.slice(0,10);
  const m=v.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})$/); if(m)return `${m[3]}-${String(m[1]).padStart(2,'0')}-${String(m[2]).padStart(2,'0')}`;
  const d=new Date(v); return (!isNaN(d)&&/\d{4}/.test(v))?d.toISOString().slice(0,10):null; }
function gTime(v){ v=String(v||'').trim(); if(!v)return null; const m=v.match(/(\d{1,2}):(\d{2})/); if(m)return `${String(m[1]).padStart(2,'0')}:${m[2]}`;
  const d=new Date(v); return !isNaN(d)?d.toISOString().slice(11,16):null; }

// Parse a punch datetime (from Log Time) into {date:'YYYY-MM-DD', time:'HH:MM'} in wall-clock terms
function parsePunchTS(v){
  if(v instanceof Date && !isNaN(v)){ const p=n=>String(n).padStart(2,'0');
    return {date:`${v.getUTCFullYear()}-${p(v.getUTCMonth()+1)}-${p(v.getUTCDate())}`,time:`${p(v.getUTCHours())}:${p(v.getUTCMinutes())}`}; }
  v=String(v||'').trim(); if(!v)return null;
  let m=v.match(/^(\d{4})-(\d{2})-(\d{2})[T ]\s*(\d{1,2}):(\d{2})/);
  if(m)return {date:`${m[1]}-${m[2]}-${m[3]}`,time:`${String(m[4]).padStart(2,'0')}:${m[5]}`};
  m=v.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})[ T]+(\d{1,2}):(\d{2})(?::\d{2})?\s*([AaPp][Mm])?/);
  if(m){ let hh=parseInt(m[4],10); const ap=(m[6]||'').toUpperCase();
    if(ap==='PM'&&hh<12)hh+=12; if(ap==='AM'&&hh===12)hh=0;
    return {date:`${m[3]}-${String(m[1]).padStart(2,'0')}-${String(m[2]).padStart(2,'0')}`,time:`${String(hh).padStart(2,'0')}:${m[5]}`}; }
  // "Jan  1 2026  4:25AM"  /  "Jan 15 2026 12:05 PM"   (Sprout biolog export)
  const MON={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
  m=v.match(/^([A-Za-z]{3,9})\s+(\d{1,2})\s+(\d{4})\s+(\d{1,2}):(\d{2})(?::(\d{2}))?\s*([AaPp][Mm])?/);
  if(m){ const mo=MON[m[1].slice(0,3).toLowerCase()];
    if(mo){ let hh=parseInt(m[4],10); const ap=(m[7]||'').toUpperCase();
      if(ap==='PM'&&hh<12)hh+=12; if(ap==='AM'&&hh===12)hh=0;
      return {date:`${m[3]}-${String(mo).padStart(2,'0')}-${String(m[2]).padStart(2,'0')}`,time:`${String(hh).padStart(2,'0')}:${m[5]}`}; } }
  const d=new Date(v); if(isNaN(d))return null; const p=n=>String(n).padStart(2,'0');
  return {date:`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`,time:`${p(d.getHours())}:${p(d.getMinutes())}`};
}
// Map an InOutMode value to punch_state (0=IN, 1=OUT), or null if unknown
function punchState(mode){
  const s=String(mode==null?'':mode).toLowerCase().trim(); if(!s)return null;
  if(/out/.test(s))return 1; if(/in/.test(s))return 0;
  const n=parseInt(s,10); if(!isNaN(n))return (n===1||n===2||n===5)?1:0; // ZK: 1 out,2 break-out,5 OT-out
  return null;
}
async function dtrImport(){
  const inp=document.getElementById('dtrFile'); const f=inp&&inp.files[0]; if(!f){toast('Choose a CSV or Excel file');return;}
  const rows=await readSheet(f); if(!rows||!rows.length){toast('No rows found');return;}
  const box=document.getElementById('dtrResult'); box.innerHTML='<div class="spin">Importing…</div>';
  const {data:emps}=await sb.from('hris_employees').select('id,employee_no,biometric_id,first_name,last_name');
  const byNo={},byBio={},byName={};
  (emps||[]).forEach(e=>{ if(e.employee_no)byNo[norm(e.employee_no)]=e.id; if(e.biometric_id)byBio[norm(e.biometric_id)]=e.id;
    const fn=norm(e.first_name), ln=norm(e.last_name); if(fn||ln){ byName[ln+fn]=e.id; byName[fn+ln]=e.id; } });
  const findName=v=>{ const k=norm(v); return k?(byName[k]||null):null; };
  // Detect format from first row's keys
  const k0={}; Object.keys(rows[0]||{}).forEach(k=>k0[norm(k)]=1);
  const isBiolog = (k0.logtime||k0.logdatetime||k0.punchtime||k0.datetime) && !k0.timein && !k0.timeout;
  let ok=0,fail=0; const errs=[]; const punches=[]; const missBio=new Set();
  if(isBiolog){
    const dayMap={};
    for(const r of rows){
      const o={}; Object.keys(r).forEach(k=>{o[norm(k)]=r[k];});
      let eid=byBio[norm(o.biometricid||o.biometricno||o.deviceid)]||byNo[norm(o.employeeno||o.employeeid)];
      if(!eid && o.fullname) eid=findName(o.fullname);
      const ts=parsePunchTS(o.logtime||o.logdatetime||o.punchtime||o.datetime);
      if(!eid){fail++; if(o.biometricid)missBio.add(String(o.biometricid)); errs.push(`${o.fullname||o.biometricid||'?'}: employee not matched (Biometric ID / name)`);continue;}
      if(!ts){fail++;errs.push(`${o.fullname||o.biometricid||'?'}: invalid Log Time "${o.logtime||''}"`);continue;}
      const key=eid+'|'+ts.date; (dayMap[key]=dayMap[key]||{eid,date:ts.date,punches:[]}).punches.push({time:ts.time,state:punchState(o.inoutmode)});
    }
    for(const key in dayMap){ const d=dayMap[key];
      d.punches.sort((a,b)=>a.time<b.time?-1:(a.time>b.time?1:0));
      // de-dupe identical time+state
      const seen={}; d.punches=d.punches.filter(p=>{const s=p.time+'/'+p.state; if(seen[s])return false; seen[s]=1; return true;});
      let hasIn=d.punches.some(p=>p.state===0), hasOut=d.punches.some(p=>p.state===1);
      if(!hasIn){ d.punches[0].state=0; hasIn=true; }
      if(!hasOut && d.punches.length>1){ d.punches[d.punches.length-1].state=1; hasOut=true; }
      d.punches.forEach((p,i)=>{ if(p.state===null) p.state=(i===0?0:1); });
      d.punches.forEach(p=>punches.push({employee_id:d.eid,punch_time:d.date+'T'+p.time+':00+08:00',punch_state:p.state,source:'biolog'}));
      ok++;
    }
  } else {
    for(const r of rows){
      const o={}; Object.keys(r).forEach(k=>{o[norm(k)]=r[k];});
      let eid=byNo[norm(o.employeeid||o.employeeno)]||byBio[norm(o.biometricid)];
      if(!eid && o.fullname) eid=findName(o.fullname);
      const date=gToDate(o.date); const tin=gTime(o.timein); const tout=gTime(o.timeout);
      if(!eid){fail++;errs.push(`${o.employeeid||o.employeeno||o.biometricid||'?'}: employee not found in this company`);continue;}
      if(!date){fail++;errs.push(`${o.employeeid||o.employeeno||'?'}: invalid date`);continue;}
      if(!tin && !tout){fail++;errs.push(`${o.employeeid||o.employeeno||'?'} ${date}: no time in/out`);continue;}
      if(tin) punches.push({employee_id:eid,punch_time:date+'T'+tin+':00+08:00',punch_state:0,source:'manual'});
      if(tout) punches.push({employee_id:eid,punch_time:date+'T'+tout+':00+08:00',punch_state:1,source:'manual'});
      ok++;
    }
  }
  // insert in batches
  for(let i=0;i<punches.length;i+=500){
    const {error}=await sb.from('hris_attendance_logs').upsert(punches.slice(i,i+500),{onConflict:'employee_id,punch_time,punch_state',ignoreDuplicates:true});
    if(error){errs.push('Batch error: '+error.message);}
  }
  const missMsg = missBio.size?`<div class="muted" style="font-size:12px;margin-top:8px;color:var(--red,#c0392b)">${missBio.size} Biometric ID(s) had no matching employee (e.g. ${[...missBio].slice(0,6).map(esc).join(', ')}). Set each employee's <b>Biometric ID (device PIN)</b> to match Sprout, then re-import.</div>`:'';
  box.innerHTML=`<div class="panel pad"><b style="color:var(--green-d)">${isBiolog?'Biolog':'Daily DTR'} import · ${ok} day-record(s)</b> · Failed ${fail} · ${punches.length} punches
    ${missMsg}
    ${errs.length?`<div class="muted" style="font-size:12px;margin-top:8px">${errs.slice(0,12).map(esc).join('<br>')}${errs.length>12?`<br>…and ${errs.length-12} more`:''}</div>`:''}
    <div class="muted" style="font-size:12px;margin-top:8px">Daily Time Records were recomputed automatically. You can now run the Payroll Generator for the cutoff.</div></div>`;
  toast(`Attendance imported: ${ok} day-records`);
}

async function reqLogLoad(){
  const from=val('rl_from'), to=val('rl_to'), ty=val('rl_type'), st=val('rl_status');
  const q=(val('rl_q')||'').trim().toLowerCase();
  const box=document.getElementById('rl_out'); box.innerHTML='<div class="spin">Loading…</div>';

  // Employee search: resolve "name or Employee ID" to a list of employee ids in this company.
  let ids=null, qLabel='';
  if(q){
    const {data:EE}=await sb.from('hris_employees')
      .select('id,first_name,last_name,middle_name,employee_no,biometric_id')
      .eq('company_id',ME.company);
    const hit=(EE||[]).filter(e=>{
      const f=(e.first_name||''), l=(e.last_name||''), m=(e.middle_name||'');
      const names=[`${f} ${l}`,`${l} ${f}`,`${l}, ${f}`,`${f} ${m} ${l}`,f,l].join(' | ').toLowerCase();
      return names.includes(q)
          || String(e.employee_no||'').toLowerCase()===q
          || String(e.employee_no||'').toLowerCase().includes(q)
          || String(e.biometric_id||'').toLowerCase()===q;
    });
    if(!hit.length){ box.innerHTML=`<div class="panel pad">No employee matches “${esc(q)}”.</div>`; return; }
    ids=hit.map(e=>e.id);
    qLabel=hit.length===1 ? `${hit[0].first_name} ${hit[0].last_name} (${hit[0].employee_no||'—'})` : `${hit.length} employees matching “${q}”`;
  }

  // NOTE: both tables have TWO FKs to hris_employees (employee_id + approver_id),
  // so every embed must name the constraint explicitly (EMP_FK / EMPL_FK).
  let rq=sb.from('hris_requests')
      .select(`id,type,request_date,date_to,time_from,time_to,hours,location,reason,status,approved_at,remarks,created_at,${EMP_FK}(first_name,last_name,employee_no,company_id)`)
      .eq('hris_employees.company_id',ME.company)
      .gte('request_date',from).lte('request_date',to).order('request_date',{ascending:false}).limit(3000);
  let lv=sb.from('hris_leave_requests')
      .select(`id,date_from,date_to,days,day_portion,reason,status,approved_at,remarks,created_at,hris_leave_types(name),${EMPL_FK}(first_name,last_name,employee_no,company_id)`)
      .eq('hris_employees.company_id',ME.company)
      .gte('date_from',from).lte('date_from',to).order('date_from',{ascending:false}).limit(3000);
  if(ty && ty!=='leave') rq=rq.eq('type',ty);
  if(st){ rq=rq.eq('status',st); lv=lv.eq('status',st); }
  if(ids && ids.length<=300){ rq=rq.in('employee_id',ids); lv=lv.in('employee_id',ids); }
  const [{data:R,error:e1},{data:L,error:e2}] = await Promise.all([
    (ty==='leave')?Promise.resolve({data:[]}):rq,
    (ty && ty!=='leave')?Promise.resolve({data:[]}):lv
  ]);
  if(e1||e2){box.innerHTML=`<div class="panel pad">⚠️ ${esc((e1||e2).message)}</div>`;return;}
  const rows=[];
  (R||[]).forEach(r=>{ const m=REQTYPES[r.type]||{};
    const e=r.hris_employees||{};
    rows.push({id:r.id, leave:false, d:r.request_date, no:e.employee_no, who:`${e.first_name||''} ${e.last_name||''}`.trim(),
      kind:m.short||r.type, label:m.label||r.type, cls:m.tag||'gray',
      detail:(String(r.date_to||'')&&String(r.date_to)!==String(r.request_date)?`${fdate(r.request_date)} – ${fdate(r.date_to)}`:fdate(r.request_date))
        +(r.time_from?` · ${String(r.time_from).slice(0,5)}–${String(r.time_to||'').slice(0,5)}`:'')
        +(r.hours?` · ${r.hours} hr`:'')+(r.location?` · ${r.location}`:''),
      reason:r.reason, status:r.status, approved_at:r.approved_at, remarks:r.remarks, filed:r.created_at});

// Approve / Reject / Cancel straight from the log. The DB enforces who may act
// (manager of the employee, or HR staff — and never on your own request).
async function rlAct(id,isLeave,action){
  let remarks=null;
  if(action==='rejected'||action==='cancelled'){
    remarks=prompt(action==='rejected'?'Reason for rejecting (optional):':'Reason for cancelling (optional):','');
    if(remarks===null) return; // user backed out
    remarks=remarks.trim()||null;
  }
  const fn=isLeave?'hris_act_leave':'hris_act_request';
  const {error}=await sb.rpc(fn,{p_request:id,p_action:action,p_remarks:remarks});
  if(error){ toast('Error: '+error.message); return; }
  toast('Request '+action);
  reqLogLoad();
}
function reqLogExport(){
  const rows=window._reqlog||[]; if(!rows.length){toast('Nothing to export');return;}
  const head=['Date','Employee No','Employee','Type','Request','Reason','Status','Approved/Rejected On','Remarks'];
  const csv=[head.join(',')].concat(rows.map(r=>[r.d,r.no,r.who,r.label,r.detail,r.reason,r.status,r.approved_at||'',r.remarks||'']
    .map(v=>`"${String(v==null?'':v).replace(/"/g,'""')}"`).join(','))).join('\n');
  const b=new Blob([csv],{type:'text/csv'}),u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;
  a.download='request_approval_log_'+(ME.companyName||'company').replace(/\W+/g,'_')+'.csv';a.click();URL.revokeObjectURL(u);
}

function riStatus(s){
  const t=String(s||'').toLowerCase();
  if(t.includes('approve')) return 'approved';
  if(t.includes('reject') || t.includes('disapprove')) return 'rejected';
  if(t.includes('cancel')) return 'cancelled';
  return 'pending';
}
function riDate(v){ const p=parsePunchTS(v); if(p) return p.date; return gToDate(v); }
function riTs(v){ const p=parsePunchTS(v); return p? (p.date+'T'+p.time+':00+08:00') : null; }
function riTime(v){
  if(v==null||v==='') return null;
  const s=String(v).trim();
  const m=s.match(/^(\d{1,2}):(\d{2})/); if(m) return `${String(m[1]).padStart(2,'0')}:${m[2]}`;
  const p=parsePunchTS(s); return p? p.time : null;
}
function riHours(a,b){
  if(!a||!b) return null;
  const [h1,m1]=a.split(':').map(Number), [h2,m2]=b.split(':').map(Number);
  let mins=(h2*60+m2)-(h1*60+m1); if(mins<0)mins+=1440;
  return Math.round(mins/60*100)/100;
}
async function reqImport(){

  const byLt={}; lts.forEach(t=>{ byLt[norm(t.name)]=t.id; byLt[norm(t.code)]=t.id; });

  const sheet=n=>{ const s=wb.Sheets[n]; return s? XLSX.utils.sheet_to_json(s,{defval:''}) : []; };
  const g=(r,...keys)=>{ const o={}; Object.keys(r).forEach(k=>o[norm(k)]=r[k]);
    for(const k of keys){ const v=o[norm(k)]; if(v!==undefined && v!=='') return v; } return ''; };
  const key=(...parts)=>parts.map(x=>String(x==null?'':x)).join('|').slice(0,300);

  // Schedule Adjustment

  // Leave
  sheet('Leave').forEach(r=>{

    leaves.push({employee_id:eid, leave_type_id:lt||null,
      date_from:d, date_to:riDate(g(r,'Date To'))||d, days:days||1,
      reason:String(g(r,'Reason')||'')||null,

  });

  box.innerHTML='<div class="spin">Importing '+(reqs.length+leaves.length)+' request(s)…</div>';

    if(error) errs.push('Requests: '+error.message); else okR+=reqs.slice(i,i+300).length;
  }

    const {error}=await sb.from('hris_leave_requests').upsert(leaves.slice(i,i+300),{onConflict:'import_key',ignoreDuplicates:true});

  box.innerHTML=`<div class="panel pad">

  </div>`;

// Sprout calls them "Sick" / "Vacation" / "Birthday"; our catalogue uses full names + codes.
const LT_ALIAS={sick:'SL', sickleave:'SL', vacation:'VL', vacationleave:'VL',
  birthday:'BDL', birthdayleave:'BDL', bereavement:'BL', bereavementleave:'BL',
  emergency:'EL', emergencyleave:'EL', maternity:'ML', maternityleave:'ML',
  paternity:'PL', paternityleave:'PL', leavewithoutpay:'LWOP', lwop:'LWOP', withoutpay:'LWOP'};
function ltCodeFor(name){
  const words=String(name||'').trim().split(/\s+/).filter(Boolean);
  const c=words.map(w=>w[0]).join('').toUpperCase().slice(0,6);
  return c||'XL';
}
async function leaveImport(){
  const inp=document.getElementById('liFile'); const f=inp&&inp.files[0];
  if(!f){toast('Choose the Leave Report (.xlsx)');return;}
  if(typeof XLSX==='undefined'){toast('Excel reader not loaded');return;}
  const year=Number(val('li_year'))||new Date().getFullYear();
  const doBal=val('li_bal')==='1';
  const box=document.getElementById('liResult'); box.innerHTML='<div class="spin">Reading workbook…</div>';
  const wb=XLSX.read(await f.arrayBuffer(),{type:'array',cellDates:false,raw:false});

  const [{data:emps},lts0] = await Promise.all([
    sb.from('hris_employees').select('id,employee_no,biometric_id').eq('company_id',ME.company),
    allLeaveTypes()
  ]);
  const byId={}; (emps||[]).forEach(e=>{ if(e.employee_no)byId[norm(e.employee_no)]=e.id; if(e.biometric_id)byId[norm(e.biometric_id)]=e.id; });

  // leave-type resolver, auto-creating anything Sprout has that we don't
  const byLt={}; lts0.forEach(t=>{ byLt[norm(t.name)]=t.id; byLt[norm(t.code)]=t.id; });
  const created=[];
  async function ltId(name){
    const raw=String(name||'').trim(); if(!raw) return null;
    const k=norm(raw);
    if(byLt[k]) return byLt[k];
    const alias=LT_ALIAS[k]; if(alias && byLt[norm(alias)]){ byLt[k]=byLt[norm(alias)]; return byLt[k]; }
    let code=ltCodeFor(raw), n=1;
    while(byLt[norm(code)]){ code=ltCodeFor(raw)+(++n); }
    const {data,error}=await sb.from('hris_leave_types')
      .insert({code, name:raw, default_days:0, is_paid:true, is_active:true}).select('id').single();
    if(error||!data) return null;
    byLt[k]=data.id; byLt[norm(code)]=data.id; created.push(`${raw} (${code})`);
    return data.id;
  }

  const g=(r,...keys)=>{ const o={}; Object.keys(r).forEach(k=>o[norm(k)]=r[k]);
    for(const k of keys){ const v=o[norm(k)]; if(v!==undefined && v!=='') return v; } return ''; };
  const key=(...p)=>p.map(x=>String(x==null?'':x)).join('|').slice(0,300);

  const txSheets=wb.SheetNames.filter(n=>/transaction/i.test(n));
  const sumSheets=wb.SheetNames.filter(n=>/summary/i.test(n));
  if(!txSheets.length && !sumSheets.length){
    box.innerHTML='<div class="panel pad">⚠️ This workbook has no “Leave Transactions Report” or “Leave Summary Report” sheet. Is it really Sprout’s Leave Report?</div>';
    return;
  }

  // ---------- 1. transactions -> leave requests ----------
  const leaves=[]; const miss=new Set(); let skipped=0;
  for(const sn of txSheets){
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:''});
    for(const r of rows){
      const empRaw=g(r,'EmployeeID','Employee ID','Employee No');
      if(!empRaw) continue;
      const eid=byId[norm(empRaw)];
      if(!eid){ miss.add(String(empRaw)); skipped++; continue; }
      const d=riDate(g(r,'DateFrom','Date From')); if(!d) continue;
      const dt=riDate(g(r,'DateTo','Date To'))||d;
      const tid=await ltId(g(r,'LeaveTypeName','Leave Type'));
      if(!tid){ skipped++; continue; }
      const days=(Number(g(r,'WithPayNoOfdays','With Pay No Of Days'))||0)
                +(Number(g(r,'WoutPayNoOfDays','Without Pay No Of Days'))||0);
      leaves.push({employee_id:eid, leave_type_id:tid, date_from:d, date_to:dt, days:days||1,
        reason:String(g(r,'Reason')||'')||null,
        status:riStatus(g(r,'LeaveStatus','Leave Status','Status')),
        approved_at: riTs(g(r,'DateApprovedSupervisor','DateRejectedSupervisor','Date Approved'))||null,
        remarks:String(g(r,'RejectReason','Reject Reason')||'')||null,
        import_key: key(ME.company,'leave',empRaw,d,dt,String(g(r,'DateFiled')||''),String(g(r,'Reason')||'').slice(0,40))});
    }
  }

  // ---------- 2. summary -> leave balances ----------
  // "Total Available Balance (YTD)" is what's LEFT. We store it as the entitlement with 0 used,
  // so Leave Credits shows exactly the remaining days Sprout reports.
  const bals=new Map(); let balSkip=0;
  if(doBal){
    for(const sn of sumSheets){
      const aoa=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:''});
      const hi=aoa.findIndex(row=>Array.isArray(row)&&row.some(c=>norm(c)==='employeeid'));
      if(hi<0) continue;
      const head=(aoa[hi]||[]).map(x=>norm(x));
      for(const row of aoa.slice(hi+1)){
        if(!Array.isArray(row)) continue;
        const o={}; head.forEach((h,i)=>{o[h]=row[i];});
        const empRaw=o.employeeid; if(!empRaw||String(empRaw).trim()==='') continue;
        const eid=byId[norm(empRaw)];
        if(!eid){ miss.add(String(empRaw)); balSkip++; continue; }
        const tid=await ltId(o.leavetype);
        if(!tid){ balSkip++; continue; }
        const bal=Number(o.totalavailablebalanceytd);
        if(isNaN(bal)) continue;
        bals.set(eid+'|'+tid, {employee_id:eid, leave_type_id:tid, year, entitled:bal, used:0});
      }
    }
  }
