<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Company HRIS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root{
    --green:#1f9d57; --green-d:#17773f; --green-l:#e7f6ee;
    --ink:#1f2933; --muted:#6b7885; --line:#e4e9ee; --bg:#eef1f4;
    --amber:#c77700; --red:#c0392b; --blue:#2266cc; --white:#fff;
    --nav:#123d2e; --navb:#0e3125; --secbar:#2ba6e0; --secbar2:#1e93cf;
    --shadow:0 1px 3px rgba(16,24,40,.08),0 1px 2px rgba(16,24,40,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
  a{color:var(--green);text-decoration:none}
  button{font-family:inherit;cursor:pointer}
  .hide{display:none!important}

  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#1b8a5a,#0f5c3c)}
  .login-card{background:#fff;border-radius:14px;padding:38px 34px;width:360px;box-shadow:0 20px 50px rgba(0,0,0,.25)}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .logo{width:38px;height:38px;border-radius:9px;background:var(--green);color:#fff;display:grid;place-items:center;font-weight:800;font-size:20px}
  .brand h1{font-size:20px;margin:0}
  .brand span{color:var(--muted);font-size:12px}
  .login-card p.sub{color:var(--muted);margin:2px 0 22px}
  label{display:block;font-weight:600;font-size:12.5px;margin:12px 0 5px;color:#3a4652}
  input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:14px;background:#fff;color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-l)}
  .btn{background:var(--green);color:#fff;border:none;padding:10px 16px;border-radius:8px;font-weight:600;font-size:14px}
  .btn:hover{background:var(--green-d)}
  .btn.block{width:100%;margin-top:18px;padding:11px}
  .btn.sm{padding:6px 11px;font-size:12.5px}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn.ghost:hover{background:#f7f9fb}
  .btn.danger{background:var(--red)}
  .btn.amber{background:var(--amber)}
  .err{color:var(--red);font-size:12.5px;margin-top:10px;min-height:16px}
  .hint{background:var(--green-l);border-radius:8px;padding:9px 11px;font-size:12px;color:#2a5e45;margin-top:16px;line-height:1.5}

  #app{min-height:100vh}
  /* ---- Sprout-style top nav ---- */
  .topnav{background:var(--nav);color:#dfeee7;display:flex;align-items:center;gap:8px;padding:0 22px;height:60px;position:sticky;top:0;z-index:40}
  .topnav .brand{display:flex;align-items:center;gap:9px;cursor:pointer;margin-right:14px}
  .topnav .brand .logo{width:34px;height:34px;border-radius:50%;background:transparent;display:grid;place-items:center;font-size:22px}
  .topnav .brand .bt{color:#fff;font-weight:800;font-size:16px;line-height:1.05;letter-spacing:.2px}
  .topnav .brand .bt span{display:block;font-weight:600;font-size:11px;color:#8fc7ad;letter-spacing:1px}
  .menu{flex:1;display:flex;align-items:center;gap:2px;height:100%}
  .grp{position:relative;height:100%;display:flex;align-items:center}
  .grpbtn{background:none;border:none;color:#cfe6da;font-weight:600;font-size:13.5px;padding:8px 14px;border-radius:7px;display:flex;align-items:center;gap:6px;height:38px}
  .grp:hover .grpbtn,.grpbtn.active{background:rgba(255,255,255,.12);color:#fff}
  .grpbtn .caret{font-size:9px;opacity:.8}
  .drop{position:absolute;top:56px;left:8px;background:#fff;border-radius:10px;min-width:220px;box-shadow:0 12px 34px rgba(0,0,0,.22);padding:7px;display:none;z-index:50}
  .grp:hover .drop{display:block}
  .drop a{display:block;color:var(--ink);padding:9px 13px;border-radius:7px;font-size:13.5px;font-weight:500;cursor:pointer}
  .drop a:hover{background:var(--green-l);color:var(--green-d)}
  .topright{display:flex;align-items:center;gap:12px}
  .empsearch{width:190px;padding:7px 12px;border-radius:20px;border:none;background:rgba(255,255,255,.16);color:#fff;font-size:13px}
  .empsearch::placeholder{color:#bcd6ca}
  .empsearch:focus{outline:none;background:rgba(255,255,255,.24);box-shadow:none}
  .coswitch{background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:7px 10px;font-size:12.5px;font-weight:600;max-width:200px}
  .coswitch option{color:#1f2933}
  .avatar{position:relative}
  .av{width:36px;height:36px;border-radius:50%;background:var(--green);color:#fff;display:grid;place-items:center;font-weight:800;cursor:pointer;border:2px solid rgba(255,255,255,.35)}
  .usermenu{position:absolute;right:0;top:46px;background:#fff;border-radius:10px;box-shadow:0 12px 34px rgba(0,0,0,.22);padding:14px;min-width:190px;z-index:50}
  .usermenu .who{color:var(--ink);font-weight:700}
  .usermenu .role{color:var(--muted);text-transform:capitalize;font-size:12.5px;margin-bottom:10px}

  .pagehead{background:#fff;border-bottom:1px solid var(--line);padding:14px 26px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .pagehead h2{margin:0;font-size:19px}
  .pagehead .sub{color:var(--muted);font-size:12.5px;margin-top:2px}

  /* ---- Sprout-style sectioned form (accordion) ---- */
  .secbar{background:var(--secbar);color:#fff;border-radius:8px 8px 0 0;padding:12px 18px;display:flex;align-items:center;gap:11px;font-weight:700;font-size:14px;cursor:pointer;user-select:none;margin-top:14px}
  .secbar .sico{font-size:16px}
  .secbar .caret{margin-left:auto;font-size:12px;transition:.2s}
  .secbar.collapsed .caret{transform:rotate(-90deg)}
  .secbody{background:#fff;border:1px solid var(--line);border-top:none;border-radius:0 0 10px 10px;padding:20px}
  .secbody.collapsed{display:none}
  .req{color:var(--red);font-size:11.5px;margin-top:3px}
  /* ---- Dashboard widgets ---- */
  .wgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  @media(max-width:1050px){.wgrid{grid-template-columns:1fr 1fr}}
  @media(max-width:720px){.wgrid{grid-template-columns:1fr}}
  .widget{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}
  .widget .wh{display:flex;align-items:center;gap:9px;padding:14px 18px;border-bottom:1px solid #eef2f5;font-weight:700}
  .widget .wh .wi{width:26px;height:26px;border-radius:7px;background:var(--green-l);color:var(--green-d);display:grid;place-items:center;font-size:14px}
  .widget .wb{padding:16px 18px;flex:1}
  .pie{width:150px;height:150px;border-radius:50%;margin:6px auto}
  .donut{width:150px;height:150px;border-radius:50%;margin:6px auto;display:grid;place-items:center}
  .donut .hole{width:96px;height:96px;background:#fff;border-radius:50%;display:grid;place-items:center;text-align:center;font-weight:800;font-size:20px}
  .lgnd{display:flex;flex-wrap:wrap;gap:6px 14px;justify-content:center;margin-top:10px;font-size:12px;color:#556}
  .lgnd i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:middle}
  .kv{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed #eef2f5;font-size:13.5px}
  .kv:last-child{border-bottom:none}
  .kv b{font-weight:800}
  .statline{display:flex;align-items:center;gap:12px}
  .statline .big{font-size:30px;font-weight:800}
  header.top .sub{color:var(--muted);font-size:12.5px;margin-top:2px}
  .content{padding:24px 26px;flex:1}

  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:22px}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow)}
  .card .k{color:var(--muted);font-size:12.5px;font-weight:600}
  .card .v{font-size:27px;font-weight:800;margin-top:6px}
  .card .v small{font-size:13px;color:var(--muted);font-weight:600}
  .panel{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);margin-bottom:22px;overflow:hidden}
  .panel .ph{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .panel .ph h3{margin:0;font-size:15px}
  .panel .pb{padding:0}
  .panel .pad{padding:18px}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);padding:11px 14px;border-bottom:1px solid var(--line);background:#fafbfc}
  td{padding:10px 14px;border-bottom:1px solid #eef2f5;font-size:13.5px;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#fafcfb}
  .tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:700}
  .tag.green{background:var(--green-l);color:var(--green-d)}
  .tag.amber{background:#fdf0da;color:var(--amber)}
  .tag.red{background:#fce8e6;color:var(--red)}
  .tag.gray{background:#eef1f4;color:#5b6b7a}
  .tag.blue{background:#e5eefc;color:var(--blue)}
  .chip{background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer}
  .chip:hover{border-color:var(--green)}
  .chip.on{background:var(--green-l);border-color:var(--green);color:var(--green-d)}
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .toolbar input,.toolbar select{width:auto;min-width:130px}
  .row{display:flex;gap:16px;flex-wrap:wrap}
  .row>*{flex:1;min-width:180px}
  .muted{color:var(--muted)}
  .right{text-align:right}
  .center{text-align:center}
  .empty{padding:34px;text-align:center;color:var(--muted)}
  .spin{padding:34px;text-align:center;color:var(--muted)}

  .modal-bg{position:fixed;inset:0;background:rgba(16,24,40,.5);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:60;overflow:auto}
  .modal{background:#fff;border-radius:14px;width:640px;max-width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal.wide{width:820px}
  .modal .mh{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .modal .mh h3{margin:0;font-size:17px}
  .modal .mb{padding:20px;max-height:70vh;overflow:auto}
  .modal .mf{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
  .x{background:none;border:none;font-size:22px;color:var(--muted);line-height:1}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  .code{font-family:ui-monospace,Consolas,monospace;font-size:12px;background:#f4f6f8;border:1px solid var(--line);border-radius:6px;padding:8px 10px;word-break:break-all}
  .toast{position:fixed;bottom:22px;right:22px;background:#12261c;color:#fff;padding:12px 18px;border-radius:9px;box-shadow:0 8px 24px rgba(0,0,0,.3);z-index:90;font-size:13.5px;opacity:0;transform:translateY(10px);transition:.25s}
  .toast.show{opacity:1;transform:none}
  .ps-line{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed #e4e9ee}
  .ps-line.total{border-bottom:2px solid var(--ink);font-weight:800;margin-top:4px}
  .ps-sec{font-weight:800;color:var(--green-d);margin:14px 0 4px;font-size:12.5px;text-transform:uppercase;letter-spacing:.4px}
  @media print{aside,header.top,.noprint{display:none!important}main{margin:0}.content{padding:0}}

  /* ---- Payslip print: half of A4 (A5) ---- */
  #printMount{display:none}
  @media print{
    @page{size:A4 portrait;margin:16mm}
    html,body{background:#fff!important}
    body>*{display:none!important}
    #printMount{display:block!important;position:static}
    #printMount *{visibility:visible}
  }
  .ps5{font-family:'Segoe UI',system-ui,sans-serif;color:#1f2933;width:100%}
  .ps5 .hd{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #1b8a5a;padding-bottom:9px;margin-bottom:14px}
  .ps5 .hd .co{font-size:21px;font-weight:800;color:#146b46}
  .ps5 .hd .co small{display:block;font-weight:500;color:#6b7885;font-size:12px}
  .ps5 .hd .ttl{text-align:right;font-size:15px;font-weight:800;letter-spacing:.5px}
  .ps5 .meta{display:grid;grid-template-columns:1fr 1fr;gap:4px 18px;font-size:13px;margin-bottom:16px}
  .ps5 .meta b{color:#3a4652}
  .ps5 .cols{display:grid;grid-template-columns:1fr 1fr;gap:26px}
  .ps5 .sec{font-size:13px;font-weight:800;color:#146b46;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid #e4e9ee;padding-bottom:4px;margin-bottom:6px}
  .ps5 .ln{display:flex;justify-content:space-between;font-size:13.5px;padding:4px 0}
  .ps5 .ln.tot{font-weight:800;border-top:1px solid #cbd5dd;margin-top:5px;padding-top:5px}
  .ps5 .net{margin-top:18px;background:#e8f5ee;border:1px solid #bfe3ce;border-radius:8px;padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
  .ps5 .net b{font-size:26px;color:#146b46}
  .ps5 .net span:first-child{font-weight:800;letter-spacing:.5px;font-size:15px}
  .ps5 .er{font-size:11.5px;color:#6b7885;margin-top:14px}
  .ps5 .sign{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:60px;font-size:12.5px;text-align:center}
  .ps5 .sign .line{border-top:1px solid #1f2933;padding-top:5px;margin-top:44px;color:#6b7885}
</style>
</head>

  <form class="login-card" onsubmit="doLogin(event)">

<div id="copick" class="hide" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1f9d57,#0f5c3c)">

<script>
const SUPABASE_URL = "https://emkcwukiqxnvcbhkjiqz.supabase.co";
const SUPABASE_KEY = "sb_publishable_u_qnmEI8oHI9Z_A0-Hht3Q_Yvaa7Ork";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const WEBHOOK_BASE = SUPABASE_URL + "/functions/v1/zkteco-webhook";

let ME = { user:null, role:'employee', employee_id:null, name:'', company:null, companyName:'', companies:[] };
let CURRENT = 'dashboard';

const $ = s => document.querySelector(s);
const el = (h)=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstChild;};
const peso = n => '₱'+Number(n||0).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2});
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fdate = d => d? new Date(d).toLocaleDateString('en-PH',{year:'numeric',month:'short',day:'numeric'}):'—';
const ftime = d => d? new Date(d).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Manila'}):'—';
const fdt = d => d? new Date(d).toLocaleString('en-PH',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',timeZone:'Asia/Manila'}):'—';
const todayStr = ()=> new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}
// ===== Per-module system access =====
// Canonical module list shown as checkboxes in Access Control.
const ACCESS=[
  {k:'employees',       l:'Employee Records (201)'},
  {k:'attendance',      l:'Attendance / DTR & Timekeeping'},
  {k:'leave',           l:'Leave Management'},
  {k:'payroll_prepare', l:'Payroll — Prepare / Generate'},
  {k:'payroll_approve', l:'Payroll — Approve'},
  {k:'loans',           l:'Employee Loans'},
  {k:'requests_approve',l:'Approve Requests (Approval Center)'},
  {k:'reports',         l:'Reports'},
  {k:'maintenance',     l:'Maintenance & Setup'},
  {k:'devices',         l:'Biometric Devices'},
  {k:'access_control',  l:'Access Control (Admin)'},
];
// Default module set when a member has no explicit permissions (backward-compatible with role).
const ROLE_PERMS={
  admin:   ACCESS.map(a=>a.k),
  hr:      ['employees','attendance','leave','payroll_prepare','loans','requests_approve','reports','maintenance','devices'],
  approver:['payroll_approve','leave','requests_approve','reports'],
  // Timekeeping / Payroll only — prepares payroll but cannot approve it, and cannot touch 201 files.
  timekeeper:['attendance','payroll_prepare','loans','reports','devices'],
  manager: ['leave','requests_approve'],
  employee:[],
};
function permsFor(role,explicit){
  if(explicit && explicit.length) return new Set(explicit);
  return new Set(ROLE_PERMS[role]||[]);
}
function can(k){ return !!(ME.perms && ME.perms.has(k)); }
// Derive the base security role (for RLS + maker-checker) from a chosen module set.
function roleFromPerms(set){
  if(set.has('access_control')) return 'admin';
  const prep = set.has('payroll_prepare')||set.has('employees')||set.has('attendance')||set.has('maintenance')||set.has('loans')||set.has('devices');
  const appr = set.has('payroll_approve');
  if(prep && appr) return 'admin';            // needs both prepare & approve → full admin
  if(appr) return 'approver';
  // Timekeeping/Payroll: works attendance + payroll, but no 201 access and no leave/approvals
  if((set.has('attendance')||set.has('payroll_prepare')) && !set.has('employees')
     && !set.has('leave') && !set.has('requests_approve') && !set.has('maintenance')) return 'timekeeper';
  if(prep||set.has('reports')) return 'hr';
  if(set.has('requests_approve')||set.has('leave')) return 'manager';
  return 'employee';
}
// Payslip letterhead — always the company you're actually signed into.
function coName(){ const c=ME.co||{}; return c.legal_name || c.name || ME.companyName || 'Company'; }
function coSub(){
  const c=ME.co||{};

function closeModal(){$('#modal-root').innerHTML='';}
function openModal(html,wide){$('#modal-root').innerHTML='';const bg=el(`<div class="modal-bg"></div>`);
  bg.appendChild(el(`<div class="modal ${wide?'wide':''}">${html}</div>`));
  bg.addEventListener('click',e=>{if(e.target===bg)closeModal();});$('#modal-root').appendChild(bg);}
function val(id){const e=document.getElementById(id);return e?e.value.trim():'';}

async function doLogin(e){
  e.preventDefault();
  const btn=$('#li_btn');btn.disabled=true;btn.textContent='Signing in…';$('#li_err').textContent='';
  const idv=$('#li_email').value.trim(); const pass=$('#li_pass').value;
  // Accept Employee ID, username, personal email, or the login email — resolve to the auth email.
  let email=idv;
  try{ const {data}=await sb.rpc('hris_login_email',{p_login:idv}); if(data) email=data; }catch(_){}
  let {error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error && email!==idv){ // fall back to whatever they typed
    const r=await sb.auth.signInWithPassword({email:idv,password:pass}); error=r.error;
  }
  if(error){$('#li_err').textContent='Invalid login. Check your Employee ID, username or email and your password.';btn.disabled=false;btn.textContent='Sign in';return;}
  await boot();
}
async function doLogout(){await sb.auth.signOut();location.reload();}
function changePassword(){
  openModal(`<div class="mh"><h3>Change Password</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="mb">
      <div class="fld"><label>New Password</label><input id="cp_new" type="password" placeholder="At least 8 characters"></div>
      <div class="fld" style="margin-top:10px"><label>Confirm New Password</label><input id="cp_confirm" type="password"></div>
    </div>
    <div class="mf"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn" onclick="savePassword()">Update Password</button></div>`);
}
async function savePassword(){
  const p=val('cp_new'),c=val('cp_confirm');
  if(p.length<8){toast('Password must be at least 8 characters');return;}
  if(p!==c){toast('Passwords do not match');return;}
  const {error}=await sb.auth.updateUser({password:p});
  if(error){toast('Error: '+error.message);return;}
  closeModal();toast('Password updated');
}

async function boot(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){$('#login').classList.remove('hide');$('#app').classList.add('hide');$('#copick').classList.add('hide');return;}
  ME.user=session.user;
  const {data:r}=await sb.from('hris_user_roles').select('role,employee_id').eq('user_id',session.user.id).maybeSingle();
  ME.role=r?.role||'employee'; ME.employee_id=r?.employee_id||null;
  const {data:mems}=await sb.from('hris_company_members').select('company_id,role,permissions,employee_id,hris_companies(name,login_code,is_active)').eq('user_id',session.user.id).eq('is_active',true);
  // a disabled company is not selectable — nobody can work in it
  ME.companies=(mems||[])
    .filter(m=>m.hris_companies?.is_active!==false)
    .map(m=>({id:m.company_id,name:m.hris_companies?.name||'Company',code:(m.hris_companies?.login_code||'').toUpperCase(),role:m.role,permissions:m.permissions||null,employee_id:m.employee_id||null}));
  // A separated employee (Resigned/Terminated/AWOL) has no active company access.
  if(!ME.companies.length){
    await sb.auth.signOut();
    $('#app').classList.add('hide'); $('#copick').classList.add('hide'); $('#login').classList.remove('hide');
    const err=$('#li_err'); if(err) err.textContent='Access disabled. This account is no longer active. Please contact HR.';
    return;
  }
  $('#login').classList.add('hide');
  // Multiple companies -> let the user pick which to sign into
  if(ME.companies.length>1){ showCompanyPicker(); return; }
  await enterApp(ME.companies[0]?ME.companies[0].id:null);
}
function showCompanyPicker(){
  $('#copick_list').innerHTML=`
    <label>Company</label>
    <select id="copick_sel">${ME.companies.map(c=>`<option value="${c.id}">${esc(c.name)} — ${esc(c.role)}</option>`).join('')}</select>
    <button class="btn block" onclick="enterApp(document.getElementById('copick_sel').value)">Continue</button>
    <div class="hint" style="margin-top:14px">Signed in as ${esc(ME.user.email)}. Choose which company to enter.</div>`;
  $('#app').classList.add('hide'); $('#copick').classList.remove('hide');
}
async function enterApp(companyId){
  ME.company=companyId;
  if(companyId){
    await sb.from('hris_user_prefs').upsert({user_id:ME.user.id,active_company_id:companyId,updated_at:new Date().toISOString()},{onConflict:'user_id'});
    const m=ME.companies.find(c=>c.id===companyId); if(m){ ME.role=m.role; ME.companyName=m.name; ME.companyCode=m.code||''; ME.perms=permsFor(m.role,m.permissions); if(m.employee_id) ME.employee_id=m.employee_id; }
    // letterhead for payslips — the real company, not a hardcoded one
    try{
      const {data:co}=await sb.from('hris_companies')
        .select('name,legal_name,address,tin,phone,email').eq('id',companyId).maybeSingle();
      ME.co = co || {name:ME.companyName};
    }catch(_){ ME.co={name:ME.companyName}; }
  }
  if(!ME.perms) ME.perms=permsFor(ME.role,null);
  // Supervisors/managers: load direct reports so Team Attendance appears
  try{ const {data:team}=await sb.rpc('hris_my_team'); ME.team=team||[]; }catch(_){ ME.team=[]; }
  ME.hasTeam=(ME.team||[]).length>0;
  // Always show the person's real name — never fall back to an email address.
  ME.name=null;
  if(ME.employee_id){
    const {data:emp}=await sb.from('hris_employees').select('first_name,middle_name,last_name,employee_no').eq('id',ME.employee_id).maybeSingle();
    if(emp) ME.name=[emp.first_name,emp.last_name].filter(Boolean).join(' ').trim();
    if(emp) ME.employee_no=emp.employee_no;
  }
  if(!ME.name){ // no 201 record linked (e.g. an admin-only account)
    const meta=(ME.user.user_metadata||{});
    ME.name = meta.full_name || meta.name || String(ME.user.email||'').split('@')[0];
  }
  $('#copick').classList.add('hide'); $('#login').classList.add('hide'); $('#app').classList.remove('hide');
  $('#who').textContent=ME.name; $('#whorole').textContent=ME.role;
  $('#avBtn').textContent=(ME.name||'A').trim().charAt(0).toUpperCase();
  buildCompanySwitcher();
  buildNav(); go((isStaff()||ME.hasTeam)?'dashboard':'myprofile');
}

function canApproveRequests(){ return can('requests_approve')||isStaff()||isAdmin()||!!ME.hasTeam; }
function allowItem(x){ if(x.appr && !canApproveRequests())return false; if(x.team && !ME.hasTeam && !isStaff())return false; if(x.perm && !can(x.perm))return false; if(x.admin && !isAdmin())return false; if(x.staff && !isStaff())return false; return true; }
function buildNav(){
  const nav=$('#nav');nav.innerHTML='';
  MENU.forEach((g,gi)=>{
    if(g.staff && !isStaff())return;
    if(g.view){ // single top-level item
      if(!allowItem(g))return;
      const b=el(`<div class="grp"><button class="grpbtn" data-views="${g.view}">${esc(g.label)}</button></div>`);
      b.querySelector('button').onclick=()=>go(g.view);
      nav.appendChild(b); return;
    }
    const items=(g.items||[]).filter(allowItem);
    if(!items.length)return;
    const views=items.map(i=>i.view).join(',');
    const grp=el(`<div class="grp"><button class="grpbtn" data-views="${views}">${esc(g.label)} <span class="caret">▾</span></button><div class="drop"></div></div>`);
    const drop=grp.querySelector('.drop');
    items.forEach(it=>{ const a=el(`<a>${esc(it.label)}</a>`); a.onclick=()=>navItem(it); drop.appendChild(a); });
    nav.appendChild(grp);
  });
}

// ---------- My Missing Logs (reminder + one-click COA) ----------
async function myMissingWidget(){
  if(!ME.employee_id) return '';
  const t=todayStr(), from=new Date(Date.now()-90*864e5).toISOString().slice(0,10);
  const [{data:dtr},{data:coas}] = await Promise.all([
    sb.from('hris_dtr').select('work_date,time_in,time_out,remarks')
      .eq('employee_id',ME.employee_id).eq('status','incomplete')
      .gte('work_date',from).lte('work_date',t).order('work_date',{ascending:false}).limit(60),
    sb.from('hris_requests').select('request_date,status')
      .eq('employee_id',ME.employee_id).eq('type','coa').in('status',['pending','approved'])
      .gte('request_date',from)
  ]);
  const filed={}; (coas||[]).forEach(c=>{filed[c.request_date]=c.status;});
  const rows=(dtr||[]);
  if(!rows.length) return `<div class="widget">
    <div class="wh"><span class="wi">🕒</span> My Missing Logs</div>
    <div class="wb"><div class="muted" style="font-size:12.5px;padding:6px 0">
      ✅ Nothing to fix — every day in the last 90 days has both a time in and a time out.</div></div></div>`;
  const open=rows.filter(r=>!filed[r.work_date]);
  return `<div class="widget">
    <div class="wh"><span class="wi">🕒</span> My Missing Logs
      <span class="tag amber" style="margin-left:8px">${open.length} to file</span></div>
    <div class="wb">
      <div class="muted" style="font-size:12.5px;margin-bottom:8px">
        The biometric only captured one side of these days, so they currently count as
        <b>0 hours</b>. File a <b>Certificate of Attendance</b> to declare your actual time.</div>
      <table style="font-size:12.5px"><tbody>
      ${rows.slice(0,8).map(r=>{
        const st=filed[r.work_date];
        const what=r.time_in?'No time out':'No time in';
        return `<tr>
          <td><b>${fdate(r.work_date)}</b><div class="muted" style="font-size:11px">${esc(what)}</div></td>
          <td class="muted">${r.time_in?ftime(r.time_in):'—'} / ${r.time_out?ftime(r.time_out):'—'}</td>
          <td class="right">${st
            ? `<span class="tag ${st==='approved'?'green':'amber'}">COA ${st}</span>`
            : `<button class="btn sm" onclick="fileCOAFor('${r.work_date}')">File COA</button>`}</td>
        </tr>`;
      }).join('')}
      </tbody></table>
      ${rows.length>8?`<div class="muted" style="font-size:11.5px;margin-top:6px">…and ${rows.length-8} more.</div>`:''}
      <div style="margin-top:10px"><button class="btn ghost sm" onclick="go('req_coa')">View my Certificates of Attendance</button></div>
    </div></div>`;
}

  const atot=Math.max(present+late+absent+onleave,1);

            <span><i style="background:var(--blue)"></i>Leave ${onleave}</span>
            <span><i style="background:#e2464a"></i>Absent ${absent}</span>
          </div>
        </div>
      </div>
      <div class="widget">
        <div class="wh"><span class="wi">👥</span> Headcount</div>
        <div class="wb">
          <div class="donut" style="${donut}"><div class="hole">${empCount}<div style="font-size:11px;color:var(--muted);font-weight:600">Active</div></div></div>
          <div class="lgnd">${Object.entries(stC).map(([k,v])=>`<span><i style="background:${stCol[k]||'#94a3b8'}"></i>${esc(k)} ${v}</span>`).join('')||'<span class="muted">No employees</span>'}</div>
        </div>
      </div>
      <div class="widget">
        <div class="wh"><span class="wi">📌</span> Company Snapshot</div>
        <div class="wb">
          <div class="kv"><span>Pending leave approvals</span><b style="color:var(--amber)">${(pendLeave||[]).length}</b></div>
          <div class="kv"><span>Payroll awaiting approval</span><b style="color:var(--blue)">${(pendPay||[]).length}</b></div>
          <div class="kv"><span>Clocked-in today</span><b>${clocked} / ${empCount}</b></div>
          <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn sm" onclick="go('leave')">Leave</button>
            <button class="btn ghost sm" onclick="go('payroll')">Payroll</button>
            <button class="btn ghost sm" onclick="go('attendance')">Attendance</button>
          </div>
        </div>
      </div>
      ${myStuff}
      ${myMissing}
      ${teamW}
      ${teamR}
    </div>
    <div class="wgrid" style="margin-top:18px;grid-template-columns:2fr 1fr">
      <div class="widget">
        <div class="wh"><span class="wi">🕑</span> Recent Biometric Punches <button class="btn ghost sm" style="margin-left:auto" onclick="go('attendance')">View all</button></div>
        <div class="wb" style="padding:0">
          <table><thead><tr><th>Employee</th><th>Bio ID</th><th>Type</th><th>Time</th></tr></thead>
          <tbody>${(recent||[]).map(r=>`<tr>
            <td>${r.hris_employees?esc(r.hris_employees.first_name+' '+r.hris_employees.last_name):'<span class="muted">Unmatched</span>'}</td>
            <td>${esc(r.biometric_id||'')}</td>
            <td>${r.punch_state===0?'<span class="tag green">IN</span>':'<span class="tag gray">OUT</span>'}</td>
            <td>${fdt(r.punch_time)}</td></tr>`).join('')||'<tr><td colspan=4 class="empty">No punches yet</td></tr>'}</tbody></table>
        </div>
      </div>
      <div class="widget">

function bulkMoveOpen(){

  const targets=(ME.companies||[]).filter(c=>c.id!==ME.company);

async function bulkMoveDo(ids){

  closeModal(); toast(`Moved ${ok}${fail?', '+fail+' failed':''}`); go('employees');
}

async function loadVisa(empId){
  const {data}=await sb.from('hris_visa').select('*').eq('employee_id',empId).order('created_at');
  const box=document.getElementById('visaList'); if(!box)return;
  box.innerHTML=(data||[]).length?`<table><tbody>${data.map(v=>`<tr><td><b>${esc(v.visa_type||'Visa')}</b> ${esc(v.visa_number||'')}<div class="muted" style="font-size:12px">${esc(v.country||'')} ${v.expiry_date?'· exp '+fdate(v.expiry_date):''}</div></td>
    <td class="right"><button class="btn ghost sm" onclick="delVisa('${v.id}','${empId}')">✕</button></td></tr>`).join('')}</tbody></table>`
    :'<div class="muted">No visa records.</div>';
}
async function addVisa(empId){ const {error}=await sb.from('hris_visa').insert({employee_id:empId,visa_type:val('vs_type')||null,visa_number:val('vs_num')||null,country:val('vs_country')||null,issue_date:val('vs_issue')||null,expiry_date:val('vs_exp')||null});
  if(error){toast(error.message);return;} ['vs_type','vs_num','vs_country','vs_issue','vs_exp'].forEach(k=>{const el=document.getElementById(k);if(el)el.value='';}); loadVisa(empId); }
async function delVisa(id,empId){ const {error}=await sb.from('hris_visa').delete().eq('id',id); if(error){toast(error.message);return;} loadVisa(empId); }

// Spell out what the Basic Salary figure MEANS for the chosen run type — this is the
// single easiest number in an HRIS to enter wrong.
const RATE_HINT={
  'hourly':      'Enter the rate <b>per hour</b>. Paid for hours actually worked.',
  'daily':       'Enter the rate <b>per day</b>. Paid for days actually worked.',
  'semi-monthly':'Enter the amount <b>per cutoff</b> (half a month). Gov’t contributions use ×2 as the monthly basis.',
  'monthly':     'Enter the amount <b>per month</b>. Absences are deducted at the daily rate.',
};

  const h=document.getElementById('e_rate_hint'); if(!h) return;
  h.innerHTML=RATE_HINT[val('e_rate')]||'Syncs with payroll';
}

// A day is "incomplete" when the biometric only captured one side of it —
// the employee punched in but never out (or vice-versa). We never invent the missing punch.
function dtrMissing(r){ return !r.time_in || !r.time_out; }
async function loadDTR(){
  const f=val('dtrFrom'),t=val('dtrTo'),emp=val('dtrEmp'),show=val('dtrShow');
  let q=sb.from('hris_dtr').select('*,hris_employees(first_name,last_name,employee_no)').gte('work_date',f).lte('work_date',t).order('work_date',{ascending:false}).order('employee_id');
  if(emp)q=q.eq('employee_id',emp);
  const {data}=await q;
  let rows=data||[];
  const missing=rows.filter(dtrMissing);
  if(show==='incomplete') rows=missing;
  else if(show==='late')  rows=rows.filter(r=>r.late_minutes>0);
  window._dtr=rows; window._dtrMissing=missing;
  const mins=m=>m?`${Math.floor(m/60)?Math.floor(m/60)+'h ':''}${m%60}m`:'—';
  const act=isPreparer();

  const sum=document.getElementById('dtrSum');
  if(sum) sum.innerHTML = missing.length
    ? `<div class="pad" style="background:#fdf3e3;border-bottom:1px solid #f0d9ac">
         ⚠️ <b>${missing.length}</b> day-record(s) in this range have a <b>missing punch</b> —
         ${missing.filter(r=>r.time_in&&!r.time_out).length} with no time out,
         ${missing.filter(r=>!r.time_in&&r.time_out).length} with no time in.
         Hours are not counted for these days until they're corrected.
         <button class="btn ghost sm" style="margin-left:8px" onclick="document.getElementById('dtrShow').value='incomplete';loadDTR()">Show them</button>
       </div>`
    : `<div class="pad muted" style="border-bottom:1px solid var(--line);font-size:13px">✅ No missing logs in this range — every day has both a time in and a time out.</div>`;

  document.getElementById('dtrBox').innerHTML=`<table><thead><tr><th>Date</th><th>Employee</th><th>Time In</th><th>Time Out</th><th class="right">Hours</th><th class="right">Late</th><th class="right">OT</th><th>Status</th>${act?'<th class="right">Adjust</th>':''}</tr></thead>
    <tbody>${rows.map((r,i)=>{
      const miss=dtrMissing(r);
      return `<tr${miss?' style="background:#fffaf0"':''}>
      <td>${fdate(r.work_date)}</td>
      <td>${esc((r.hris_employees?.first_name||'')+' '+(r.hris_employees?.last_name||''))}</td>
      <td>${r.time_in?ftime(r.time_in):'<span style="color:#c0392b;font-weight:600">missing</span>'}</td>
      <td>${r.time_out?ftime(r.time_out):'<span style="color:#c0392b;font-weight:600">missing</span>'}</td>
      <td class="right">${Number(r.hours_worked||0).toFixed(2)}</td>
      <td class="right">${r.late_minutes?'<span style="color:var(--amber)">'+mins(r.late_minutes)+'</span>':'—'}</td>
      <td class="right">${r.overtime_minutes?mins(r.overtime_minutes):'—'}</td>
      <td>${miss?`<span class="tag amber">incomplete</span><div class="muted" style="font-size:11px">${esc(r.remarks||'')}</div>`:statusTag(r.status)}</td>
      ${act?`<td class="right"><button class="btn ${miss?'':'ghost'} sm" onclick="adjustTime(${i})">${miss?'Fix':'Adjust'}</button></td>`:''}</tr>`;
    }).join('')||`<tr><td colspan="${act?9:8}" class="empty">No records in range</td></tr>`}</tbody></table>`;
}
function dtrExportMissing(){
  const rows=window._dtrMissing||[];
  if(!rows.length){toast('No missing logs in this range');return;}
  const head=['Date','Employee No','Employee','Time In','Time Out','What is missing'];
  const csv=[head.join(',')].concat(rows.map(r=>[
    r.work_date, r.hris_employees?.employee_no||'',
    ((r.hris_employees?.first_name||'')+' '+(r.hris_employees?.last_name||'')).trim(),
    r.time_in?ftime(r.time_in):'', r.time_out?ftime(r.time_out):'',
    r.time_in?'No time out':'No time in'
  ].map(v=>`"${String(v==null?'':v).replace(/"/g,'""')}"`).join(','))).join('\n');
  const b=new Blob([csv],{type:'text/csv'}),u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;
  a.download='missing_logs_'+(ME.companyName||'company').replace(/\W+/g,'_')+'.csv';a.click();URL.revokeObjectURL(u);
}
function adjustTime(i){
  const r=(window._dtr||[])[i]; if(!r)return;
  const hm=d=>d?new Date(d).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Manila'}):'';
  openModal(`<div class="mh"><h3>Adjust Time — ${esc((r.hris_employees?.first_name||'')+' '+(r.hris_employees?.last_name||''))}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="mb"><p class="muted">${fdate(r.work_date)} — set the corrected time in/out. This replaces the day's punches (marked as manual) and recomputes hours, tardiness and overtime.</p>
      <div class="grid2"><div class="fld"><label>Time In</label><input id="aj_in" type="time" value="${hm(r.time_in)}"></div>
      <div class="fld"><label>Time Out</label><input id="aj_out" type="time" value="${hm(r.time_out)}"></div></div></div>
    <div class="mf"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn" onclick="saveAdjust('${r.employee_id}','${r.work_date}')">Save Adjustment</button></div>`);
}
async function saveAdjust(empId,workDate){
  const tin=val('aj_in'), tout=val('aj_out');
  if(!tin && !tout){toast('Enter at least a time in or out');return;}
  const {data:lk}=await sb.from('hris_timesheet_locks').select('lock_until').eq('company_id',ME.company).maybeSingle();
  if(lk?.lock_until && workDate<=lk.lock_until){toast('Timesheet is locked through '+fdate(lk.lock_until)+' — cannot adjust this date');return;}
  const {error:delErr}=await sb.from('hris_attendance_logs').delete().eq('employee_id',empId).eq('work_date',workDate);
  if(delErr){toast('Error: '+delErr.message);return;}
  const rows=[];
  if(tin) rows.push({employee_id:empId,punch_time:workDate+'T'+tin+':00+08:00',punch_state:0,source:'manual'});
  if(tout) rows.push({employee_id:empId,punch_time:workDate+'T'+tout+':00+08:00',punch_state:1,source:'manual'});
  if(rows.length){ const {error}=await sb.from('hris_attendance_logs').insert(rows); if(error){toast('Error: '+error.message);return;} }
  closeModal();toast('Time adjusted');loadDTR();loadLogs();
}
function statusTag(s){const m={present:'green',late:'amber',absent:'red',leave:'blue',holiday:'gray',restday:'gray'};return `<span class="tag ${m[s]||'gray'}">${s}</span>`;}
async function loadLogs(){
  // Use the RPC — it carries the device name AND SERIAL NUMBER, the audit trail that
  // proves which physical terminal produced each punch.
  const {data,error}=await sb.rpc('hris_device_punches',{p_limit:50});
  const box=document.getElementById('logBox'); if(!box) return;
  if(error){box.innerHTML=`<div class="pad">⚠️ ${esc(error.message)}</div>`;return;}
  const srcTag=r=>{
    const s=r.source||'';
    if(s==='device') return `<span class="tag green">device</span>`;
    if(s==='manual') return `<span class="tag amber">manual</span>`;
    return `<span class="tag gray">${esc(s)}</span>`;
  };
  const devCell=r=>{
    if(r.serial_no||r.device_name)
      return `${esc(r.device_name||'Device')}<div class="muted" style="font-size:11px;font-family:ui-monospace,monospace">SN ${esc(r.serial_no||'—')}</div>`;
    return `<span class="muted">${r.source==='manual'?'Entered by staff':'No device'}</span>`;
  };
  box.innerHTML=`<table><thead><tr><th>Employee</th><th>Bio ID</th><th>Type</th><th>Timestamp</th><th>Device / Serial No</th><th>Source</th></tr></thead>
    <tbody>${(data||[]).map(r=>`<tr>
      <td>${r.matched?esc(r.employee_name||''):`<span class="muted">Unmatched (${esc(r.biometric_id||'')})</span>`}</td>
      <td>${esc(r.biometric_id||'')}</td>
      <td>${r.punch_state===0?'<span class="tag green">IN</span>':'<span class="tag gray">OUT</span>'}</td>
      <td>${fdt(r.punch_time)}</td>
      <td>${devCell(r)}</td>
      <td>${srcTag(r)}</td></tr>`).join('')||'<tr><td colspan=6 class="empty">No logs</td></tr>'}</tbody></table>`;
}

      <div class="fld"><label>Duration</label>

// A half day is always one date and always 0.5 — lock the fields so it can't be mis-filed.
// Then check the employee actually has the credits; if not, block and point them at LWOP.
let _lvBal=null, _lvBirthMonth;
async function lvPortion(){
  const p=val('lv_portion'), from=val('lv_from');
  const to=document.getElementById('lv_to'), days=document.getElementById('lv_days');
  const hint=document.querySelector('#lv_hint div');
  if(!to||!days) return;
  if(p==='whole'){
    to.disabled=false; days.disabled=false;
    if(Number(days.value)===0.5) days.value=1;
    if(hint) hint.textContent='';
  } else {
    to.value=from; to.disabled=true;
    days.value='0.5'; days.disabled=true;
    if(hint) hint.textContent = p==='first_half'
      ? 'Morning off — 0.5 day deducted.'
      : 'Afternoon off — 0.5 day deducted.';
  }
  await lvCheckBalance();
}
function lvIsUnpaid(){
  const sel=document.getElementById('lv_type'); if(!sel) return false;
  const o=sel.options[sel.selectedIndex]; if(!o) return false;
  return o.dataset.paid==='0' || String(o.dataset.code||'').toUpperCase()==='LWOP';
}
function lvTypeCode(){
  const sel=document.getElementById('lv_type'); if(!sel) return '';
  const o=sel.options[sel.selectedIndex];
  return o? String(o.dataset.code||'').toUpperCase() : '';
}
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
function lvSwitchToLWOP(){
  const sel=document.getElementById('lv_type');
  const opt=[...sel.options].find(o=>String(o.dataset.code||'').toUpperCase()==='LWOP' || o.dataset.paid==='0');
  if(!opt){toast('No “Leave Without Pay” type is set up — add it under Maintenance → Leave Types');return;}
  sel.value=opt.value; lvPortion();
}
async function lvCheckBalance(){
  const box=document.getElementById('lv_bal'), btn=document.getElementById('lv_submit');
  if(!box) return;
  const type=val('lv_type'), from=val('lv_from');
  const want=Number(val('lv_days'))||0;
  if(!type||!from||!ME.employee_id){ box.textContent=''; return; }

  if(lvIsUnpaid()){
    _lvBal=null;
    if(btn) btn.disabled=false;
    box.innerHTML=`<b>Leave Without Pay</b> — no leave credits are used, and no pay is earned for these days.`;
    return;
  }

  box.innerHTML='<span class="muted">Checking balance…</span>';
  const year=Number(String(from).slice(0,4));
  const {data,error}=await sb.rpc('hris_leave_balance',{p_employee:ME.employee_id,p_type:type,p_year:year});
  if(error){ box.innerHTML=`⚠️ ${esc(error.message)}`; _lvBal=null; return; }
  const b=(data||[])[0];
  if(!b){ box.textContent=''; _lvBal=null; return; }
  _lvBal=b;
  const rem=Number(b.remaining||0);
  let enough = want>0 && rem>=want;

  // Birthday Leave — any day inside your birth month, not just the exact date.
  let bdErr='';
  if(lvTypeCode()==='BDL'){
    if(_lvBirthMonth===undefined){
      try{ const r=await sb.rpc('hris_my_birth_month'); _lvBirthMonth=r.data; }catch(_){ _lvBirthMonth=null; }
    }
    if(!_lvBirthMonth){
      bdErr='Your birthday isn’t on your 201 file yet — HR needs to add it before you can file Birthday Leave.';
      enough=false;
    } else {
      const m1=Number(String(from).slice(5,7)), m2=Number(String(val('lv_to')||from).slice(5,7));
      if(m1!==_lvBirthMonth || m2!==_lvBirthMonth){
        bdErr=`Birthday Leave can be taken on <b>any day within ${esc(MONTHS[_lvBirthMonth-1])}</b> — your birth month. The dates you picked are outside it.`;
        enough=false;
      }
    }
  }
  // Filing window (Sick Leave = 2 days). Counted from the LAST day of leave,
  // i.e. from the day you're back at work. HR/Admin can still encode it late.
  let winMsg='', winErr='';
  const lvt=(await leaveTypes()).find(t=>t.id===type);
  const win=lvt&&lvt.file_within_days;
  if(win!=null){
    const last=new Date((val('lv_to')||from)+'T00:00:00');
    const dl=new Date(last); dl.setDate(dl.getDate()+Number(win));
    const today=new Date(todayStr()+'T00:00:00');
    const dlStr=fdate(dl.toISOString().slice(0,10));
    if(today>dl){
      winErr=`<b>Too late to file.</b> ${esc(lvt.name)} must be filed within <b>${win} day(s)</b> of the leave date —
              the deadline was <b>${esc(dlStr)}</b>. Ask HR to encode it, or file Leave Without Pay.`;
      enough=false;
    } else {
      winMsg=`⏳ ${esc(lvt.name)} must be filed within <b>${win} day(s)</b> of the leave date — deadline <b>${esc(dlStr)}</b>.`;
    }
  }
  if(btn) btn.disabled = !enough;

  box.innerHTML=`
    ${winErr?`<div style="color:#c0392b;margin-bottom:6px">${winErr}</div>`:''}
    ${winMsg?`<div class="muted" style="margin-bottom:6px">${winMsg}</div>`:''}
    ${lvTypeCode()==='BDL' && _lvBirthMonth ? `<div class="muted" style="margin-bottom:6px">🎂 Usable on <b>any day in ${esc(MONTHS[_lvBirthMonth-1])}</b>.</div>`:''}
    ${bdErr?`<div style="color:#c0392b;margin-bottom:6px">${bdErr}</div>`:''}
    <div class="kv"><span>Entitled (${year})</span><b>${Number(b.entitled||0)}</b></div>
    <div class="kv"><span>Already used</span><b>${Number(b.used||0)}</b></div>
    ${Number(b.pending||0)?`<div class="kv"><span>Reserved by pending requests</span><b>${Number(b.pending)}</b></div>`:''}
    <div class="kv" style="border-top:1px solid #e5e7eb;margin-top:6px;padding-top:6px">
      <span>Remaining</span>
      <b style="color:${rem>0?'var(--green-d,#15803d)':'#c0392b'}">${rem} day/s</b></div>
    ${(want>0 && rem<want)?`<div style="margin-top:8px;color:#c0392b">
        <b>You don't have enough ${esc(b.type_name||'leave')} credits</b> for ${want} day/s.
        You can't file this as paid leave.
        <div style="margin-top:6px"><button class="btn sm" onclick="lvSwitchToLWOP()">Use Leave Without Pay instead</button></div>
      </div>`:''}`;
}
async function leaveSave(){

function lcImportForm(){

        <div class="fld"><label>Wide values represent</label>
          <select id="lc_mode">

            <option value="used">Used days</option>
          </select></div>
      </div>
      <div style="margin-top:10px"><button class="btn ghost sm" onclick="lcTemplate()">Download Template</button></div>
      <div style="margin-top:12px"><input type="file" id="lcFile" accept=".csv,.xlsx,.xls"></div>
      <div id="lcResult" style="margin-top:12px"></div>
    </div>
    <div class="mf"><button class="btn ghost" onclick="closeModal()">Close</button><button class="btn" onclick="lcImport()">Import Credits</button></div>`);
}
function lcTemplate(){
  const csv='employee_no,leave_type,entitled,used\n00278,SL,15,2.5\n00278,VL,15,0\n00104,SL,15,0';
  const b=new Blob([csv],{type:'text/csv'}),u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='leave_credits_template.csv';a.click();URL.revokeObjectURL(u);
}
async function lcImport(){
  const inp=document.getElementById('lcFile'); const f=inp&&inp.files[0]; if(!f){toast('Choose a CSV or Excel file');return;}
  const rows=await readSheet(f); if(!rows||!rows.length){toast('No rows found');return;}
  const year=Number(val('lc_year'))||new Date().getFullYear();
  const mode=val('lc_mode')||'entitled';
  const box=document.getElementById('lcResult'); box.innerHTML='<div class="spin">Importing…</div>';
  const [{data:emps},types] = await Promise.all([
    sb.from('hris_employees').select('id,employee_no').eq('is_active',true),
    allLeaveTypes()
  ]);
  const byNo={}; (emps||[]).forEach(e=>{if(e.employee_no)byNo[norm(e.employee_no)]=e.id;});
  const byType={}; types.forEach(t=>{ byType[norm(t.code)]=t; byType[norm(t.name)]=t; });
  const k0={}; Object.keys(rows[0]||{}).forEach(k=>k0[norm(k)]=1);
  const isLong = k0.leavetype||k0.leave||k0.type;
  const recs=[]; const errs=[]; let fail=0; const unknownTypes=new Set();
  for(const r of rows){
    const o={}; Object.keys(r).forEach(k=>{o[norm(k)]=r[k];});
    const eid=byNo[norm(o.employeeno||o.employeeid||o.empno)];
    if(!eid){fail++; errs.push(`${o.employeeno||o.employeeid||'?'}: employee not found`); continue;}
    if(isLong){
      const t=byType[norm(o.leavetype||o.leave||o.type)];
      if(!t){fail++; unknownTypes.add(String(o.leavetype||o.leave||o.type||'?')); continue;}
      const ent=Number(o.entitled||o.credits||0)||0, usd=Number(o.used||0)||0;
      recs.push({employee_id:eid,leave_type_id:t.id,year,entitled:ent,used:usd});
    } else {
      // wide: every column that matches a leave code/name
      Object.keys(o).forEach(k=>{
        if(['employeeno','employeeid','empno','name','employee','fullname'].includes(k))return;
        const t=byType[k]; if(!t)return;
        const v=Number(o[k]); if(o[k]===''||isNaN(v))return;
        recs.push(mode==='used'
          ? {employee_id:eid,leave_type_id:t.id,year,entitled:Number(t.default_days||0),used:v}
          : {employee_id:eid,leave_type_id:t.id,year,entitled:v,used:0});
      });
    }
  }
  if(!recs.length){
    box.innerHTML=`<div class="panel pad">⚠️ Nothing to import. ${unknownTypes.size?`Unrecognised leave types: ${[...unknownTypes].slice(0,6).map(esc).join(', ')}. Add them under Maintenance → Leave Types first.`:'Check that employee_no matches your 201 records.'}</div>`;
    return;
  }
  let ok=0;
  for(let i=0;i<recs.length;i+=500){
    const {error}=await sb.from('hris_leave_balances').upsert(recs.slice(i,i+500),{onConflict:'employee_id,leave_type_id,year'});
    if(error){errs.push('Batch: '+error.message);} else ok+=recs.slice(i,i+500).length;
  }
  box.innerHTML=`<div class="panel pad"><b style="color:var(--green-d)">Imported ${ok} leave-credit row(s)</b> for ${year} · Failed ${fail}
    ${unknownTypes.size?`<div class="muted" style="font-size:12px;margin-top:6px">Unrecognised leave types skipped: ${[...unknownTypes].slice(0,8).map(esc).join(', ')} — add them under Maintenance → Leave Types.</div>`:''}
    ${errs.length?`<div class="muted" style="font-size:12px;margin-top:6px">${errs.slice(0,8).map(esc).join('<br>')}</div>`:''}</div>`;
  toast(`Imported ${ok} leave-credit row(s)`);
  CACHE.leaveTypes=null;
}

  const g=(window._payGmap||{})[p.pay_group_id];
  const review=`<button class="btn ghost sm" onclick="payReview('${p.id}','${esc(p.name)}')">🔍 Review</button>`;
  let acts=`<button class="btn ghost sm" onclick="paySummary('${p.id}')">Summary</button>
            <button class="btn ghost sm" onclick="payHistory('${p.id}')">Audit Trail</button>
            <button class="btn ghost sm" onclick="viewPayslips('${p.id}','${esc(p.name)}')">Payslips</button>`;
  if(p.status==='draft'||p.status==='rejected'){

  } else if(p.status==='pending_approval'){

      acts=`<button class="btn" onclick="payReview('${p.id}','${esc(p.name)}',true)">Review &amp; Approve</button>

    } else {
      acts=`<span class="tag amber" style="margin-right:6px">${isPreparer?'Awaiting approving officer':'Awaiting approval'}</span>`+review+' '+acts;

  const y=String(p.period_start||'').slice(0,4);

  const rows=data||[];

function payReviewExport(){
  const {rows,pname}=window._prv||{rows:[]};
  if(!rows.length){toast('Nothing to export');return;}
  const q=v=>`"${String(v==null?'':v).replace(/"/g,'""')}"`;
  const head=['Employee No','Employee','Days','Late (min)','OT hours','Gross','Deductions','Net Pay','Prev Net','Variance %','Payment','Needs checking'];
  const csv=[head.map(q).join(',')].concat(rows.map(r=>[
    r.employee_no,r.name,r.days_worked,r.late_minutes,r.overtime_hours,r.gross_pay,
    r.total_deductions,r.net_pay,r.prev_net,r.variance_pct,r.payment_method,(r.flags||[]).join(' | ')
  ].map(q).join(','))).join('\n');
  const b=new Blob([csv],{type:'text/csv'}),u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;
  a.download='payroll_register_'+String(pname||'').replace(/\W+/g,'_')+'.csv';a.click();URL.revokeObjectURL(u);
}
async function payReviewApprove(pid){
  const {rows}=window._prv||{rows:[]};
  const neg=rows.filter(r=>Number(r.net_pay)<0).length;
  const flagged=rows.filter(r=>(r.flags||[]).length>0).length;
  let msg='Approve this payroll?';
  if(neg) msg=`${neg} employee(s) have a NEGATIVE net pay. Approve anyway?`;
  else if(flagged) msg=`${flagged} record(s) still have exceptions. Approve anyway?`;
  if(!confirm(msg)) return;
  closeModal();
  approveModal(pid,'approve');
}

}

function rbacEditAccess(uid){
  const u=(RBAC.users||[]).find(x=>x.user_id===uid); if(!u)return;
  const cur=permsFor(u.role,u.permissions);
  openModal(`<div class="mh"><h3>Edit Access — ${esc(u.email)}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="mb">
      <div class="fld"><label>Link to Employee (optional)</label><select id="rbm_emp">${window._rbacEmpOpts(u.employee_id)}</select></div>
      <div class="fld" style="margin-top:10px"><label>System Access (select all that apply)</label>${accessGrid('rbm',cur)}</div>
      <p class="muted" style="font-size:12px;margin-top:8px">Note: <b>Payroll — Prepare</b> and <b>Payroll — Approve</b> are separate on purpose (maker-checker). Granting both makes the person a full admin able to do either. Ticking <b>Access Control</b> grants full administrator rights.</p>
      <p class="muted" style="font-size:12px"><b>Timekeeping / Payroll only</b> = attendance, DTR, timesheets, loans, biometric devices, reports and payroll <i>preparation</i>.
        They <b>cannot</b> edit 201 records, approve payroll, approve leave, or manage access.</p>
    </div>
    <div class="mf"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn" onclick="rbacSaveAccess('${uid}')">Save Access</button></div>`);
}
async function rbacSaveAccess(uid){
  const set=gatherAccess('rbm'); const emp=document.getElementById('rbm_emp')?.value||null;
  const role=roleFromPerms(set);
  const {error}=await sb.rpc('hris_set_company_access',{p_user:uid,p_role:role,p_employee:emp,p_perms:[...set]});
  if(error){toast('Error: '+error.message);return;} closeModal(); toast('Access updated');go('rbac');
}
// Admin assigns a specific password (instead of the generated temporary one).
function rbacSetPw(uid,who){
  openModal(`<div class="mh"><h3>Set Password — ${esc(who)}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="mb">
      <p class="muted" style="margin-top:0">Choose the password yourself instead of using the generated temporary one.
        Give it to the employee directly — they can change it later under their avatar → Change Password.</p>
      <div class="fld"><label>New Password</label>
        <input id="sp_pw" type="text" autocomplete="new-password" placeholder="At least 8 characters, with a letter and a number" oninput="spCheck()">
        <div class="req" id="sp_hint">Minimum 8 characters, must contain a letter and a number.</div></div>
      <div class="fld"><label>Confirm Password</label>
        <input id="sp_pw2" type="text" autocomplete="new-password" oninput="spCheck()"></div>
      <div style="margin-top:6px"><button class="btn ghost sm" onclick="spSuggest()">Suggest a strong password</button></div>
      <div class="panel pad" style="margin-top:10px;background:#f8fafc;font-size:12px">
        🔒 The password is hashed immediately and is never stored in readable form.
        The Security Audit Log records <b>who</b> changed <b>whose</b> password and when — but never the password itself.
      </div>
    </div>
    <div class="mf"><button class="btn ghost" onclick="closeModal()">Cancel</button>
      <button class="btn" id="sp_save" onclick="spSave('${uid}')" disabled>Set Password</button></div>`);
}
function spCheck(){
  const a=val('sp_pw')||'', b=val('sp_pw2')||'';
  const hint=document.getElementById('sp_hint'), btn=document.getElementById('sp_save');
  let msg='', ok=true;
  if(a.length<8){ msg='Too short — at least 8 characters.'; ok=false; }
  else if(!/[A-Za-z]/.test(a) || !/[0-9]/.test(a)){ msg='Must contain at least one letter and one number.'; ok=false; }
  else if(b && a!==b){ msg='The two passwords don’t match.'; ok=false; }
  else if(!b){ msg='Re-type it to confirm.'; ok=false; }
  else { msg='✅ Looks good.'; }
  if(hint){ hint.textContent=msg; hint.style.color = ok?'var(--green-d,#15803d)':'#c0392b'; }
  if(btn) btn.disabled = !ok;
}
function spSuggest(){
  const words=['Harvest','Breeder','Poultry','Summit','Anchor','Falcon','Granite','Meadow'];
  const w=words[Math.floor(Math.random()*words.length)];
  const n=Math.floor(1000+Math.random()*9000);
  const s='!@#$%&'[Math.floor(Math.random()*6)];
  const pw=w+n+s;
  document.getElementById('sp_pw').value=pw;
  document.getElementById('sp_pw2').value=pw;
  spCheck();
}
async function spSave(uid){
  const pw=val('sp_pw');
  const {data,error}=await sb.rpc('hris_set_password',{p_user:uid,p_password:pw});
  if(error){toast('Error: '+error.message);return;}
  closeModal();
  openModal(`<div class="mh"><h3>Password Set</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="mb">
      <p class="muted" style="margin-top:0">${esc(data||'Password updated')}. Give this to them directly — it won't be shown again.</p>
      <div style="display:flex;align-items:center;gap:10px;margin-top:6px">
        <div class="code" style="font-size:16px;padding:10px 14px">${esc(pw)}</div>
        <button class="btn ghost sm" onclick="navigator.clipboard&&navigator.clipboard.writeText('${esc(pw)}');toast('Copied')">Copy</button>
      </div>
    </div>
    <div class="mf"><button class="btn" onclick="closeModal();go('rbac')">Done</button></div>`);
}
async function rbacResetPw(uid,email){
  if(!confirm('Reset the password for '+email+'? A new temporary password will be shown, and their current password will stop working.'))return;
  const {data,error}=await sb.rpc('hris_reset_password',{p_user:uid});
  if(error){toast('Error: '+error.message);return;}
  openModal(`<div class="mh"><h3>Temporary Password</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="mb">
      <p class="muted" style="margin-top:0">Give this temporary password to <b>${esc(email)}</b>. They sign in with their <b>Employee ID</b>, <b>username</b> or <b>email</b> plus this password, then change it under their avatar → Change Password.</p>
      <div style="display:flex;align-items:center;gap:10px;margin-top:6px">
        <div class="code" id="rpw_val" style="font-size:16px;padding:10px 14px">${esc(data)}</div>
        <button class="btn ghost sm" onclick="navigator.clipboard&&navigator.clipboard.writeText('${esc(data)}');toast('Copied')">Copy</button>
      </div>
    </div>
    <div class="mf"><button class="btn" onclick="closeModal()">Done</button></div>`);
  toast('Password reset');
}
async function rbacRevoke(uid,email){
  if(!confirm('Remove access to this company for '+email+'? Their login stays and other companies are unaffected.'))return;
  const {error}=await sb.rpc('hris_remove_company_member',{p_user:uid});
  if(error){toast('Error: '+error.message);return;} toast('Access removed');go('rbac');
}
async function rbacAssignEmail(){
  const email=val('rb_email'),emp=val('rb_emp')||null; const set=gatherAccess('rbn');
  if(!email){toast('Enter an email');return;}
  // No modules ticked is VALID — that's plain Employee self-service (My Records, leave, OT…).
  // Only admin modules need an explicit tick.
  const role = set.size ? roleFromPerms(set) : 'employee';
  const {error}=await sb.rpc('hris_add_member_access',{p_email:email,p_role:role,p_employee:emp,p_perms:[...set]});
  if(error){toast('Error: '+error.message);return;}
  toast(set.size ? ('Access granted to '+email) : ('Employee self-service access granted to '+email));
  go('rbac');
}

// ================= SELF-SERVICE REQUESTS (Sprout "My Requests") =================
// hris_requests / hris_leave_requests each have TWO FKs to hris_employees
// (employee_id and approver_id). PostgREST embeds must name the constraint.
const EMP_FK  = 'hris_employees!hris_requests_employee_id_fkey';
const EMPL_FK = 'hris_employees!hris_leave_requests_employee_id_fkey';

const REQTYPES={
  overtime:{label:'Overtime',short:'OT',shape:'time',tag:'amber'},
  undertime:{label:'Undertime',short:'UT',shape:'time',tag:'amber'},
  official_business:{label:'Official Business',short:'OB',shape:'range',tag:'blue'},
  coa:{label:'Certificate of Attendance',short:'COA',shape:'logs',tag:'blue'},
  schedule_adjustment:{label:'Schedule Adjustment',short:'SA',shape:'time',tag:'gray'},
};
Object.keys(REQTYPES).forEach(tp=>{ VIEWS['req_'+tp]=()=>reqView(tp); });
function reqStatusTag(s){return `<span class="tag ${{pending:'amber',approved:'green',rejected:'red',cancelled:'gray'}[s]||'gray'}">${s}</span>`;}
async function reqView(type){
  const meta=REQTYPES[type];
  $('#vaction').innerHTML=`<button class="btn" onclick="fileReq('${type}')">+ File ${esc(meta.label)}</button>`;
  let q=sb.from('hris_requests').select(`*,${EMP_FK}(first_name,last_name)`).eq('type',type).order('created_at',{ascending:false});
  if(ME.employee_id) q=q.eq('employee_id',ME.employee_id);
  const {data}=await q;
  const detailCol=(r)=>{
    if(meta.shape==='range') return `${fdate(r.request_date)} – ${fdate(r.date_to||r.request_date)}${r.location?' · '+esc(r.location):''}`;
    if(meta.shape==='logs') return `${fdate(r.request_date)} · In ${r.time_from?r.time_from.slice(0,5):'—'} / Out ${r.time_to?r.time_to.slice(0,5):'—'}`;
    return `${fdate(r.request_date)} · ${r.time_from?r.time_from.slice(0,5):'—'}–${r.time_to?r.time_to.slice(0,5):'—'}${r.hours?' ('+r.hours+'h)':''}`;
  };
  $('#view').innerHTML=`
    <div class="panel"><div class="ph"><h3>${esc(meta.label)} Requests</h3>
      <div class="muted" style="font-size:12.5px">Routed to your manager/supervisor for approval.</div></div>
    <div class="pb"><table><thead><tr><th>Details</th><th>Reason</th><th>Status</th><th>Filed</th><th class="right">Action</th></tr></thead>
    <tbody>${(data||[]).map(r=>`<tr>
      <td>${detailCol(r)}</td><td>${esc(r.reason||'—')}</td><td>${reqStatusTag(r.status)}${r.remarks?`<div class="muted" style="font-size:11px">“${esc(r.remarks)}”</div>`:''}</td>
      <td class="muted" style="font-size:12px">${fdt(r.created_at)}</td>
      <td class="right">${(r.status==='pending'||r.status==='approved')?`<button class="btn ghost sm" onclick="reqAct('${r.id}','cancelled')">Cancel</button>`:'—'}</td></tr>`).join('')
      ||`<tr><td colspan=5 class="empty">No ${esc(meta.label.toLowerCase())} requests yet</td></tr>`}</tbody></table></div></div>`;
}
async function fileReq(type){
  const meta=REQTYPES[type];
  let emps=[];
  if(isStaff()){const {data}=await sb.from('hris_employees').select('id,first_name,last_name').eq('is_active',true).order('first_name');emps=data||[];}
  // "My Requests" is always filed for yourself — no employee picker.
  const empSel=`<div class="fld" style="grid-column:1/3"><label>Filing for</label>
      <input value="${esc(ME.name||'Me')}" disabled style="background:#f3f4f6;font-weight:600"></div>`;
  let body='';
  if(meta.shape==='time'){
    const isOT = type==='overtime';
    body=`${empSel}
      <div class="fld"><label>Date</label><input id="rq_date" type="date" value="${todayStr()}" ${isOT?'onchange="otBasis()"':''}></div>
      <div class="fld"><label>Time From</label><input id="rq_tf" type="time"></div>
      <div class="fld"><label>Time To</label><input id="rq_tt" type="time"></div>
      ${isOT?`<div class="fld" style="grid-column:1/3"><label>Basis (actual time record)</label>
        <div id="ot_basis" class="panel pad" style="margin:0;background:#f8fafc;font-size:12.5px">Select a date…</div></div>`:''}`;
  } else if(meta.shape==='range'){
    body=`${empSel}
      <div class="fld"><label>Date From</label><input id="rq_date" type="date" value="${todayStr()}"></div>
      <div class="fld"><label>Date To</label><input id="rq_dto" type="date" value="${todayStr()}"></div>
      <div class="fld" style="grid-column:1/3"><label>Location / Destination</label><input id="rq_loc" placeholder="e.g. Client site, Cebu"></div>`;
  } else if(meta.shape==='logs'){
    // COA exists ONLY to supply a punch the biometric missed. We show what the clock
    // actually has for that day and unlock only the side that's missing.
    body=`${empSel}
      <div class="fld" style="grid-column:1/3"><label>Date</label><input id="rq_date" type="date" value="${todayStr()}" onchange="coaBasis()"></div>
      <div class="fld" style="grid-column:1/3"><label>Time record on this date</label>
        <div id="coa_basis" class="panel pad" style="margin:0;background:#f8fafc;font-size:12.5px">Checking…</div></div>
      <div class="fld"><label>Actual Time In</label><input id="rq_tf" type="time" disabled></div>
      <div class="fld"><label>Actual Time Out</label><input id="rq_tt" type="time" disabled></div>`;
  }
  openModal(`<div class="mh"><h3>File ${esc(meta.label)}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="mb"><div class="grid2">${body}
      <div class="fld" style="grid-column:1/3"><label>Reason / Remarks</label><textarea id="rq_reason" rows="2"></textarea></div>
    </div></div>
    <div class="mf"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn" id="rq_submit" onclick="saveReq('${type}')">Submit</button></div>`);
  if(type==='overtime') otBasis();
  if(type==='coa') coaBasis();
}
// Certificate of Attendance — fill in ONLY the punch the biometric missed on that date.
let _coa=null;
async function coaBasis(){
  const box=document.getElementById('coa_basis'); if(!box) return;
  const d=val('rq_date')||todayStr();
  const tf=document.getElementById('rq_tf'), tt=document.getElementById('rq_tt');
  const btn=document.getElementById('rq_submit');
  box.innerHTML='<span class="muted">Checking time record…</span>';
  const {data,error}=await sb.rpc('hris_day_record',{p_employee:ME.employee_id||null,p_date:d});
  if(error){ box.innerHTML=`⚠️ ${esc(error.message)}`; _coa=null; return; }
  const b=(data||[])[0]||{punches:0,has_in:false,has_out:false};
  _coa=b;
  const hasIn=!!b.has_in, hasOut=!!b.has_out;

  // lock the side that already exists — a real biometric punch is never overwritten
  tf.disabled=hasIn;  if(hasIn){ tf.value=''; }
  tt.disabled=hasOut; if(hasOut){ tt.value=''; }
  const complete = hasIn && hasOut;
  if(btn) btn.disabled=complete;

  if(complete){
    box.innerHTML=`<div class="kv"><span>Time In</span><b>${ftime(b.time_in)}</b></div>
      <div class="kv"><span>Time Out</span><b>${ftime(b.time_out)}</b></div>
      <div style="margin-top:6px;color:var(--green-d,#15803d)">✅ This day is complete — both punches were captured.
        A Certificate of Attendance isn't needed. Pick another date.</div>`;
  } else if(b.punches>0){
    box.innerHTML=`<div class="kv"><span>Time In</span><b>${hasIn?ftime(b.time_in):'<span style="color:#c0392b">missing</span>'}</b></div>
      <div class="kv"><span>Time Out</span><b>${hasOut?ftime(b.time_out):'<span style="color:#c0392b">missing</span>'}</b></div>
      <div style="margin-top:6px">Declare your actual <b>${hasIn?'time out':'time in'}</b> below. Once approved it is written to your DTR and your hours are recomputed.</div>`;
  } else {

async function saveReq(type){
  const meta=REQTYPES[type];
  const emp=ME.employee_id;   // always file for yourself
  if(!emp){toast('No employee record linked to your account');return;}
  if(type==='overtime'){
    if(!_otB || _otB.basis==='NO TIME RECORD'){
      toast('No time record for that date — overtime must be backed by a biometric log, manual punch or approved OB');return;
    }
    const tf=val('rq_tf'), tt=val('rq_tt');
    if(tf && tt){
      const [h1,m1]=tf.split(':').map(Number),[h2,m2]=tt.split(':').map(Number);
      let mins=(h2*60+m2)-(h1*60+m1); if(mins<0)mins+=1440;
      if(mins > (_otB.claimable_minutes||0) + 15){
        toast(`You can only claim up to ${Math.floor((_otB.claimable_minutes||0)/60)}h ${(_otB.claimable_minutes||0)%60}m based on your actual time record`);return;
      }
    }
  }
  if(type==='coa'){
    if(_coa && _coa.has_in && _coa.has_out){ toast("That date is already complete — nothing to certify"); return; }
    if(!val('rq_tf') && !val('rq_tt')){ toast('Enter the missing time in or time out'); return; }
  }
  const rec={employee_id:emp,type,reason:val('rq_reason')||null,status:'pending',
    request_date:val('rq_date')||todayStr()};
  if(meta.shape==='time'||meta.shape==='logs'){ rec.time_from=val('rq_tf')||null; rec.time_to=val('rq_tt')||null;
    if(meta.shape==='time' && rec.time_from && rec.time_to){
      const [h1,m1]=rec.time_from.split(':').map(Number),[h2,m2]=rec.time_to.split(':').map(Number);
      let mins=(h2*60+m2)-(h1*60+m1); if(mins<0)mins+=1440; rec.hours=Math.round(mins/60*100)/100; }
  }
  if(meta.shape==='range'){ rec.date_to=val('rq_dto')||rec.request_date; rec.location=val('rq_loc')||null; }
  const {error}=await sb.from('hris_requests').insert(rec);
  if(error){toast('Error: '+error.message);return;} closeModal();toast(meta.label+' filed');go('req_'+type);
}

  const a=document.createElement('a'); a.href=url; a.download=RPT.name+'.csv'; a.click(); URL.revokeObjectURL(url);
